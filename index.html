<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:10px 20px;
background:#0b3d91;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<h2 id="nome"></h2>

<h3 id="saldo"></h3>

<button onclick="window.location.href='deposito.html'">
Depositar
</button>

<button onclick="window.location.href='saque.html'">
Sacar
</button>

<br><br>

<button onclick="logout()">
Sair
</button>

</div>

<div class="card">

<h3>Extrato</h3>

<div id="extrato"></div>

</div>

<script>

let usuario

function formatarReal(valor){

return Number(valor).toLocaleString("pt-BR",{
minimumFractionDigits:2
})

}

function formatarData(data){

const d = new Date(data)

return d.toLocaleString("pt-BR",{
timeZone:"America/Sao_Paulo"
})

}

async function iniciar(){

const { data } = await sb.auth.getUser()

if(!data.user){
window.location.href="login.html"
return
}

usuario = data.user

const { data:perfil } = await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.single()

document.getElementById("nome").innerText = perfil.nome

document.getElementById("saldo").innerText =
"Saldo: R$ "+formatarReal(perfil.saldo)

carregarExtrato()

}

async function carregarExtrato(){

const { data } = await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.order("id",{ascending:false})

const div = document.getElementById("extrato")

div.innerHTML=""

data.forEach(t=>{

div.innerHTML += `
<div style="border-bottom:1px solid #eee;padding:10px 0">

<strong>${t.tipo}</strong><br>

Valor: R$ ${formatarReal(t.valor)}<br>

${t.descricao || ""}<br>

${formatarData(t.created_at)}

</div>
`

})

}

async function logout(){

await sb.auth.signOut()

window.location.href="login.html"

}

iniciar()

</script>

</body>
</html>
