<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f3f3f3;
padding:20px;
margin:0;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.topo-botoes{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

button{
padding:12px 14px;
border:none;
border-radius:8px;
background:#1e4ea1;
color:white;
font-size:16px;
cursor:pointer;
}

#btnNotif{
background:#444;
position:relative;
}

.badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
width:18px;
height:18px;
border-radius:50%;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.pendente{
color:orange;
font-weight:bold;
}

.notificacao{
border-bottom:1px solid #eee;
padding:12px 0;
line-height:1.6;
}

.notificacao:last-child{
border-bottom:none;
}

.oculto{
display:none;
}
</style>
</head>
<body>

<div class="card">
<h2 id="nome">Carregando...</h2>
<p id="saldo">Saldo: R$ 0,00</p>

<div class="topo-botoes">
<button onclick="irDeposito()">Depositar</button>
<button onclick="irSaque()">Sacar</button>

<button id="btnNotif" onclick="toggleNotificacoes()">
Notificações
<span id="badgeNotif" class="badge oculto">!</span>
</button>

<button onclick="logout()">Sair</button>
</div>
</div>

<div class="card oculto" id="cardNotificacoes">
<h3>Notificações</h3>
<div id="notificacoes">Carregando...</div>
</div>

<div class="card">
<h3>Extrato</h3>
<div id="extrato">Carregando...</div>
</div>

<script>
let usuario = null

function formatarReal(valor){
return Number(valor || 0).toLocaleString("pt-BR",{
minimumFractionDigits:2,
maximumFractionDigits:2
})
}

function horarioBrasil(data){
if(!data) return "-"
return new Date(data).toLocaleString("pt-BR",{
timeZone:"America/Sao_Paulo",
year:"numeric",
month:"2-digit",
day:"2-digit",
hour:"2-digit",
minute:"2-digit",
second:"2-digit"
})
}

async function verificarLogin(){
const { data, error } = await sb.auth.getSession()

if(error || !data.session){
location.href = "login.html"
return false
}

usuario = data.session.user
return true
}

async function carregarPerfil(){
const { data, error } = await sb
.from("profiles")
.select("*")
.eq("id", usuario.id)
.single()

if(error){
document.getElementById("nome").innerText = "Erro ao carregar"
document.getElementById("saldo").innerText = error.message
return
}

document.getElementById("nome").innerText = data.nome || "-"
document.getElementById("saldo").innerText = "Saldo: R$ " + formatarReal(data.saldo)
}

async function carregarExtrato(){
const { data, error } = await sb
.from("transacoes")
.select("*")
.eq("usuario_id", usuario.id)
.eq("status", "pendente")
.order("created_at",{ascending:false})

if(error){
document.getElementById("extrato").innerHTML = error.message
return
}

if(!data || data.length===0){
document.getElementById("extrato").innerHTML = "Nenhuma solicitação pendente."
return
}

let html = ""

data.forEach(t=>{
html += `
<p>
<b>${t.tipo}</b><br>
Valor: R$ ${formatarReal(t.valor)}<br>
Status: <span class="pendente">${t.status || "-"}</span><br>
${t.descricao || ""}<br>
${horarioBrasil(t.created_at)}
</p>
<hr>
`
})

document.getElementById("extrato").innerHTML = html
}

async function carregarNotificacoes(){
const { data, error } = await sb
.from("notificacoes")
.select("*")
.eq("usuario_id", usuario.id)
.order("created_at",{ascending:false})

if(error){
document.getElementById("notificacoes").innerHTML = error.message
return
}

if(!data || data.length===0){
document.getElementById("notificacoes").innerHTML = "Nenhuma notificação."
document.getElementById("badgeNotif").classList.add("oculto")
return
}

let html = ""

data.forEach(n=>{
html += `
<div class="notificacao">
<b>${n.titulo || "-"}</b><br>
${n.mensagem || ""}<br>
${horarioBrasil(n.created_at)}
</div>
`
})

document.getElementById("notificacoes").innerHTML = html

const temNova = data.some(n => n.lida === false)

if(temNova){
document.getElementById("badgeNotif").classList.remove("oculto")
}else{
document.getElementById("badgeNotif").classList.add("oculto")
}
}

async function marcarNotificacoesComoLidas(){
await sb
.from("notificacoes")
.update({ lida: true })
.eq("usuario_id", usuario.id)
.eq("lida", false)

document.getElementById("badgeNotif").classList.add("oculto")
}

async function toggleNotificacoes(){
document.getElementById("cardNotificacoes").classList.toggle("oculto")

const aberto = !document.getElementById("cardNotificacoes").classList.contains("oculto")

if(aberto){
await marcarNotificacoesComoLidas()
await carregarNotificacoes()
}
}

function irDeposito(){
location.href = "deposito.html"
}

function irSaque(){
location.href = "saque.html"
}

async function logout(){
await sb.auth.signOut()
location.href = "login.html"
}

async function iniciar(){
const ok = await verificarLogin()
if(!ok) return

await carregarPerfil()
await carregarExtrato()
await carregarNotificacoes()
}

iniciar()
</script>
</body>
</html>
