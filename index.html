<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:22px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
text-align:center;
}

.nome{
font-size:22px;
font-weight:bold;
}

.saldo{
font-size:54px;
font-weight:bold;
color:#0b3d91;
margin-top:12px;
}

.mineracaoCard{
background:linear-gradient(180deg,#101010,#1c1c1c);
color:white;
overflow:hidden;
}

.mineracaoTitulo{
font-weight:bold;
margin-bottom:10px;
}

svg{
max-width:420px;
width:100%;
display:block;
margin:auto;
}

/* braço picareta */

.braco{
transform-origin:245px 130px;
animation:golpe .6s infinite ease-in-out;
}

@keyframes golpe{
0%{transform:rotate(-20deg)}
40%{transform:rotate(15deg)}
100%{transform:rotate(-20deg)}
}

/* pedra tremendo */

.pedra{
animation:pedra .6s infinite;
}

@keyframes pedra{
0%,100%{transform:translateX(0)}
50%{transform:translateX(5px)}
}

/* moedas voando */

.moeda1,.moeda2,.moeda3{
opacity:0;
animation:moeda 1.8s infinite ease-out;
}

.moeda2{animation-delay:.4s}
.moeda3{animation-delay:.8s}

@keyframes moeda{
0%{opacity:0;transform:translate(0,0)}
30%{opacity:1}
100%{opacity:0;transform:translate(-90px,-30px)}
}

/* carrinho balançando */

.carrinho{
animation:carrinho 2s infinite ease-in-out;
}

@keyframes carrinho{
0%,100%{transform:rotate(0deg)}
50%{transform:rotate(-4deg)}
}

/* barra mineração */

.barraBox{
margin-top:12px;
height:10px;
background:#333;
border-radius:20px;
overflow:hidden;
}

.barra{
height:100%;
background:linear-gradient(90deg,#ffd700,#f7c948);
animation:barra 2.4s infinite linear;
}

@keyframes barra{
0%{width:0%}
100%{width:100%}
}

/* botões */

.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.depositar{background:#1e4ea1;color:white}
.sacar{background:#1faa59;color:white}
.notif{background:#444;color:white;position:relative}
.sair{background:#1e4ea1;color:white;width:100%;margin-top:10px}

.badge{
position:absolute;
top:-8px;
right:-8px;
background:red;
color:white;
font-size:12px;
padding:4px 6px;
border-radius:20px;
}

.extratoItem{
padding:10px 0;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<!-- CARD SALDO -->

<div class="card">
<div id="nome" class="nome">Carregando...</div>
<div id="saldo" class="saldo">R$ 0,00</div>
</div>


<!-- CARD MINERAÇÃO -->

<div class="card mineracaoCard">

<div class="mineracaoTitulo">⛏️ Minerando lucros...</div>

<svg viewBox="0 0 420 200">

<!-- chão -->

<rect x="20" y="140" width="380" height="40" rx="8" fill="#222"/>

<!-- carrinho -->

<g class="carrinho">
<rect x="30" y="110" width="60" height="30" fill="#ccc"/>
<circle cx="45" cy="145" r="8" fill="#c68a2f"/>
<circle cx="75" cy="145" r="8" fill="#c68a2f"/>
</g>

<!-- mineiro -->

<circle cx="210" cy="80" r="22" fill="#f5d7b7"/>
<rect x="190" y="100" width="40" height="40" fill="#ef9b52"/>

<!-- braço -->

<g class="braco">
<line x1="230" y1="110" x2="260" y2="95" stroke="#f5d7b7" stroke-width="8"/>
<line x1="260" y1="95" x2="290" y2="80" stroke="#8b5a2b" stroke-width="8"/>
<line x1="290" y1="75" x2="310" y2="95" stroke="#777" stroke-width="8"/>
</g>

<!-- pedra -->

<polygon class="pedra" points="300,140 340,90 380,140" fill="#666"/>

<!-- moedas -->

<circle class="moeda1" cx="320" cy="80" r="6" fill="gold"/>
<circle class="moeda2" cx="340" cy="85" r="6" fill="gold"/>
<circle class="moeda3" cx="300" cy="85" r="6" fill="gold"/>

</svg>

<div class="barraBox">
<div class="barra"></div>
</div>

</div>


<!-- BOTÕES -->

<div class="card">

<div class="botoes">
<button class="depositar" onclick="location.href='deposito.html'">Depositar</button>
<button class="sacar" onclick="location.href='saque.html'">Sacar</button>

<button class="notif" onclick="location.href='notificacoes.html'">
Notificações
<span id="badge" class="badge" style="display:none">0</span>
</button>

</div>

<button class="sair" onclick="logout()">Sair</button>

</div>


<!-- EXTRATO -->

<div class="card">
<h3>Extrato</h3>
<div id="extrato">Carregando...</div>
</div>


<script>

let usuario=null

function formatarReal(v){
return Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

async function iniciar(){

const {data}=await sb.auth.getSession()

if(!data.session){
location.href="login.html"
return
}

usuario=data.session.user

const perfil=await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.single()

document.getElementById("nome").innerText=perfil.data.nome
document.getElementById("saldo").innerText="R$ "+formatarReal(perfil.data.saldo)

carregarExtrato()
verificarNotificacoes()

}

async function carregarExtrato(){

const {data}=await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.eq("status","pendente")

if(!data.length){
document.getElementById("extrato").innerHTML="Nenhuma solicitação pendente."
return
}

let html=""

data.forEach(t=>{
html+=`
<div class="extratoItem">
<b>${t.tipo}</b><br>
R$ ${formatarReal(t.valor)}
</div>
`
})

document.getElementById("extrato").innerHTML=html

}

async function verificarNotificacoes(){

const {count}=await sb
.from("notificacoes")
.select("*",{count:"exact",head:true})
.eq("usuario_id",usuario.id)
.eq("lida",false)

if(count>0){
const badge=document.getElementById("badge")
badge.style.display="block"
badge.innerText=count
}

}

async function logout(){
await sb.auth.signOut()
location.href="login.html"
}

iniciar()

</script>

</body>
</html>
