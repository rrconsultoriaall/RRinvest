<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Depósito</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
background:#f3f3f3;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:12px;
border:none;
border-radius:6px;
background:#1e4ea1;
color:white;
width:100%;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

.pix{
background:#f2f6ff;
padding:10px;
border-radius:6px;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h2>Depósito</h2>

<p>Faça o depósito usando o PIX abaixo:</p>

<div class="pix" id="pix">

40223218812

</div>

<button onclick="copiarPix()">

Copiar PIX

</button>

<input
id="valor"
placeholder="Valor do depósito"
/>

<button onclick="depositar()">

Depositar

</button>

<button onclick="voltar()">

Voltar

</button>

</div>

<script>

const supabase = supabase.createClient(
"https://SEU_PROJETO.supabase.co",
"SUA_PUBLIC_ANON_KEY"
)

let user

function horarioBrasil(){

return new Date().toLocaleString(
"sv-SE",
{timeZone:"America/Sao_Paulo"}
)

}

async function iniciar(){

const {data:{session}} = await supabase.auth.getSession()

if(!session){

location.href="login.html"
return

}

user=session.user

}

function copiarPix(){

navigator.clipboard.writeText("40223218812")

alert("PIX copiado!")

}

async function depositar(){

let valor = document.getElementById("valor").value

if(!valor){

alert("Digite o valor")
return

}

await supabase
.from("transacoes")
.insert({

usuario_id:user.id,
usuario_email:user.email,
tipo:"deposito",
valor:valor,
descricao:"Depósito solicitado",
status:"pendente",
created_at:horarioBrasil()

})

alert("Depósito solicitado")

location.href="index.html"

}

function voltar(){

location.href="index.html"

}

iniciar()

</script>

</body>
</html>
