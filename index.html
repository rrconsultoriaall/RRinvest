<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRinvest</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:22px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
text-align:center;
}

.nome{
font-size:22px;
font-weight:bold;
}

.saldo{
font-size:54px;
font-weight:bold;
color:#0b3d91;
margin-top:12px;
}

.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.depositar{
background:#1e4ea1;
color:white;
}

.sacar{
background:#1faa59;
color:white;
}

.notif{
background:#444;
color:white;
position:relative;
}

.sair{
background:#1e4ea1;
color:white;
width:100%;
margin-top:10px;
}

.badge{
position:absolute;
top:-8px;
right:-8px;
background:red;
color:white;
font-size:12px;
padding:4px 6px;
border-radius:20px;
min-width:20px;
text-align:center;
}

.extratoItem{
padding:10px 0;
border-bottom:1px solid #eee;
line-height:1.6;
}

.extratoItem:last-child{
border-bottom:none;
}

.pendente{
color:orange;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
<div id="nome" class="nome">Carregando...</div>
<div id="saldo" class="saldo">R$ 0,00</div>
</div>

<div class="card">

<div class="botoes">
<button class="depositar" onclick="location.href='deposito.html'">Depositar</button>
<button class="sacar" onclick="location.href='saque.html'">Sacar</button>

<button class="notif" onclick="location.href='notificacoes.html'">
Notificações
<span id="badge" class="badge" style="display:none">0</span>
</button>
</div>

<button class="sair" onclick="logout()">Sair</button>

</div>

<div class="card">
<h3>Extrato</h3>
<div id="extrato">Carregando...</div>
</div>

<script>
let usuario = null
let saldoAtual = 0
let rendimentoPorMinuto = 0
let timerSaldo = null
let aguardandoPrimeiroDeposito = false
let saldoVersion = 0

function formatarReal(v){
return Number(v || 0).toLocaleString("pt-BR",{
minimumFractionDigits:2,
maximumFractionDigits:2
})
}

function horarioBrasil(data){
return new Date(data).toLocaleString("pt-BR",{
timeZone:"America/Sao_Paulo"
})
}

function chaveSaldo(){
return "rrinvest_saldo_" + usuario.id
}

function chaveVersion(){
return "rrinvest_saldo_version_" + usuario.id
}

function calcularRendimentoPorMinuto(saldo){
return ((Number(saldo || 0) * 0.20) / 30 / 24 / 60)
}

function atualizarSaldoNaTela(){
document.getElementById("saldo").innerText = "R$ " + formatarReal(saldoAtual)
}

function salvarSaldoLocal(){
localStorage.setItem(chaveSaldo(), String(saldoAtual))
localStorage.setItem(chaveVersion(), String(saldoVersion))
}

function limparTimer(){
if(timerSaldo){
clearInterval(timerSaldo)
timerSaldo = null
}
}

function iniciarLoopSaldo(){
limparTimer()

if(aguardandoPrimeiroDeposito || Number(saldoAtual) <= 0){
atualizarSaldoNaTela()
return
}

timerSaldo = setInterval(()=>{
saldoAtual = Number(saldoAtual) + Number(rendimentoPorMinuto)
salvarSaldoLocal()
atualizarSaldoNaTela()
},60000)

atualizarSaldoNaTela()
}

async function verificarLogin(){
const {data,error} = await sb.auth.getSession()

if(error || !data.session){
location.href = "login.html"
return false
}

usuario = data.session.user
return true
}

async function carregarPerfil(){
const {data,error} = await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.single()

if(error || !data) return

document.getElementById("nome").innerText = data.nome

const versionLocal = Number(localStorage.getItem(chaveVersion()) || -1)
const saldoLocal = Number(localStorage.getItem(chaveSaldo()) || 0)

saldoVersion = Number(data.saldo_version || 0)
aguardandoPrimeiroDeposito = !!data.aguardando_primeiro_deposito

if(versionLocal !== saldoVersion){
saldoAtual = Number(data.saldo || 0)
salvarSaldoLocal()
}else{
saldoAtual = saldoLocal
}

rendimentoPorMinuto = calcularRendimentoPorMinuto(saldoAtual)
iniciarLoopSaldo()
}

async function carregarExtrato(){
const {data,error} = await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.eq("status","pendente")
.order("created_at",{ascending:false})

if(error){
document.getElementById("extrato").innerHTML = "Erro ao carregar extrato."
return
}

if(!data || data.length === 0){
document.getElementById("extrato").innerHTML = "Nenhuma solicitação pendente."
return
}

let html = ""

data.forEach(t=>{
html += `
<div class="extratoItem">
<b>${t.tipo}</b><br>
Valor: R$ ${formatarReal(t.valor)}<br>
Status: <span class="pendente">${t.status}</span><br>
${horarioBrasil(t.created_at)}
</div>
`
})

document.getElementById("extrato").innerHTML = html
}

async function verificarNotificacoes(){
const {count,error} = await sb
.from("notificacoes")
.select("*",{count:"exact",head:true})
.eq("usuario_id",usuario.id)
.eq("lida",false)

if(error) return

const badge = document.getElementById("badge")

if(count && count > 0){
badge.style.display = "block"
badge.innerText = count > 99 ? "99+" : count
}else{
badge.style.display = "none"
}
}

async function logout(){
limparTimer()
await sb.auth.signOut()
location.href = "login.html"
}

async function iniciar(){
const ok = await verificarLogin()
if(!ok) return

await carregarPerfil()
await carregarExtrato()
await verificarNotificacoes()
}

iniciar()
</script>

</body>
  </html>
