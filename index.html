<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRinvest</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<link rel="stylesheet" href="style.css?v=7">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>
<body>

<div class="app">

  <div class="topbar">
    <div>
      <div class="brand">RRinvest</div>
      <div class="brand-sub">Painel financeiro</div>
    </div>
    <div class="premium-badge">Premium</div>
  </div>

  <!-- CARD SALDO -->
  <div class="card saldo-card">
    <div class="saldo-topo">
      <div>
        <div id="nome" class="cliente-nome">Carregando...</div>
        <div class="cliente-label">Saldo disponível</div>
      </div>
    </div>

    <div id="saldo" class="saldo-valor">R$ 0,00</div>

    <div id="reservaInfo" class="reserva-info oculto">
      Reservado na Estratégia Xadrez:
      <strong id="valorReservado">R$ 0,00</strong>
    </div>
  </div>

  <!-- CARD ESTRATÉGIA -->
  <div class="card">
    <div class="card-title">Estratégia Xadrez</div>
    <div class="card-subtitle">Monte sua estratégia de depósitos do jeito que preferir.</div>

    <div class="form-group">
      <input type="number" id="metaXadrez" placeholder="Digite o valor que quer juntar" min="1" step="1">
    </div>

    <div class="form-group">
      <select id="qtdQuadrados">
        <option value="100">100 quadrados</option>
        <option value="200">200 quadrados</option>
        <option value="300">300 quadrados</option>
        <option value="500" selected>500 quadrados</option>
      </select>
    </div>

    <button class="btn btn-xadrez" onclick="abrirEstrategiaXadrez()">Criar estratégia</button>
  </div>

  <!-- CARD AÇÕES -->
  <div class="card">
    <div class="acoes-grid">
      <button class="btn btn-deposito" onclick="location.href='deposito.html'">Depositar</button>
      <button class="btn btn-saque" onclick="location.href='saque.html'">Sacar</button>

      <button class="btn btn-notificacoes" onclick="location.href='notificacoes.html'">
        Notificações
        <span id="badge" class="badge oculto">0</span>
      </button>
    </div>

    <button class="btn btn-sair" onclick="logout()">Sair</button>
  </div>

  <!-- CARD EXTRATO -->
  <div class="card">
    <div class="extrato-header">
      <div class="card-title">Extrato</div>
      <div class="card-subtitle">Últimas movimentações pendentes</div>
    </div>

    <div id="extrato" class="extrato-lista">
      <div class="vazio">Carregando...</div>
    </div>
  </div>

</div>

<script>
let usuario = null
let saldoBanco = 0

function formatarReal(v){
  return Number(v || 0).toLocaleString("pt-BR", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  })
}

function horarioBrasil(data){
  return new Date(data).toLocaleString("pt-BR", {
    timeZone: "America/Sao_Paulo"
  })
}

function chaveDescontoXadrez(){
  return "rrinvest_xadrez_desconto_" + usuario.id
}

function lerDescontoXadrez(){
  return Number(localStorage.getItem(chaveDescontoXadrez()) || 0)
}

function atualizarSaldoNaTela(){
  const desconto = lerDescontoXadrez()
  const saldoExibicao = Math.max(0, Number(saldoBanco) - desconto)

  document.getElementById("saldo").innerText = "R$ " + formatarReal(saldoExibicao)

  const reservaInfo = document.getElementById("reservaInfo")
  const valorReservado = document.getElementById("valorReservado")

  if(desconto > 0){
    valorReservado.innerText = "R$ " + formatarReal(desconto)
    reservaInfo.classList.remove("oculto")
  }else{
    reservaInfo.classList.add("oculto")
  }
}

async function verificarLogin(){
  const { data, error } = await sb.auth.getSession()

  if(error || !data.session){
    location.href = "login.html"
    return false
  }

  usuario = data.session.user
  return true
}

async function carregarPerfil(){
  const { data, error } = await sb
    .from("profiles")
    .select("*")
    .eq("id", usuario.id)
    .single()

  if(error || !data){
    document.getElementById("nome").innerText = "Erro ao carregar"
    document.getElementById("saldo").innerText = "R$ 0,00"
    return
  }

  document.getElementById("nome").innerText = data.nome || "Cliente"
  saldoBanco = Number(data.saldo || 0)
  atualizarSaldoNaTela()
}

async function carregarExtrato(){
  const { data, error } = await sb
    .from("transacoes")
    .select("*")
    .eq("usuario_id", usuario.id)
    .eq("status", "pendente")
    .order("created_at", { ascending: false })
    .limit(20)

  const extrato = document.getElementById("extrato")

  if(error){
    extrato.innerHTML = `<div class="vazio">Erro ao carregar extrato.</div>`
    return
  }

  if(!data || data.length === 0){
    extrato.innerHTML = `<div class="vazio">Nenhuma solicitação pendente.</div>`
    return
  }

  let html = ""

  data.forEach(item => {
    html += `
      <div class="extrato-item">
        <div class="extrato-linha-topo">
          <span class="tipo-tag">${item.tipo}</span>
          <span class="valor-item">R$ ${formatarReal(item.valor)}</span>
        </div>

        <div class="status-pendente">Status: ${item.status}</div>
        <div class="data-item">${horarioBrasil(item.created_at)}</div>
      </div>
    `
  })

  extrato.innerHTML = html
}

async function verificarNotificacoes(){
  const { count, error } = await sb
    .from("notificacoes")
    .select("*", { count: "exact", head: true })
    .eq("usuario_id", usuario.id)
    .eq("lida", false)

  const badge = document.getElementById("badge")

  if(error){
    badge.classList.add("oculto")
    return
  }

  if(count && count > 0){
    badge.innerText = count > 99 ? "99+" : count
    badge.classList.remove("oculto")
  }else{
    badge.classList.add("oculto")
  }
}

function abrirEstrategiaXadrez(){
  const valor = Math.floor(Number(document.getElementById("metaXadrez").value))
  const quadrados = Number(document.getElementById("qtdQuadrados").value)

  if(!valor || valor <= 0){
    alert("Digite o valor que você quer juntar.")
    return
  }

  localStorage.setItem("rrinvest_meta_xadrez", String(valor))
  localStorage.setItem("rrinvest_qtd_xadrez", String(quadrados))
  location.href = "estrategia_xadrez.html"
}

async function logout(){
  await sb.auth.signOut()
  location.href = "login.html"
}

window.addEventListener("focus", async () => {
  if(usuario){
    await carregarPerfil()
    await verificarNotificacoes()
  }
})

async function iniciar(){
  const ok = await verificarLogin()
  if(!ok) return

  await carregarPerfil()
  await carregarExtrato()
  await verificarNotificacoes()
}

iniciar()
</script>

</body>
</html>
