<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRinvest</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:22px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
text-align:center;
}

.nome{
font-size:22px;
font-weight:bold;
color:#111;
}

.saldo{
font-size:54px;
font-weight:bold;
color:#0b3d91;
margin-top:12px;
letter-spacing:-1px;
}

.mineracaoCard{
background:linear-gradient(180deg,#101010 0%,#1d1d1d 100%);
color:white;
overflow:hidden;
position:relative;
}

.mineracaoTitulo{
font-size:18px;
font-weight:bold;
margin-bottom:12px;
}

.caverna{
width:100%;
max-width:430px;
margin:0 auto;
display:block;
}

.luzMina{
animation:luzMina 2.2s infinite ease-in-out;
}

@keyframes luzMina{
0%,100%{opacity:.35}
50%{opacity:.75}
}

.carrinho{
animation:carrinhoBalanco 1.6s infinite ease-in-out;
transform-origin:65px 162px;
}

@keyframes carrinhoBalanco{
0%,100%{transform:rotate(0deg)}
50%{transform:rotate(-3deg)}
}

.mineiroCorpo{
animation:mineiroRespira 1.4s infinite ease-in-out;
transform-origin:210px 150px;
}

@keyframes mineiroRespira{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-2px)}
}

.bracoPicareta{
animation:golpePicareta .7s infinite ease-in-out;
transform-origin:248px 132px;
}

@keyframes golpePicareta{
0%{transform:rotate(-18deg)}
45%{transform:rotate(12deg)}
100%{transform:rotate(-18deg)}
}

.pedra{
animation:pedraTreme .7s infinite ease-in-out;
transform-origin:346px 155px;
}

@keyframes pedraTreme{
0%,100%{transform:translateX(0)}
45%{transform:translateX(5px)}
}

.fa1,.fa2,.fa3{
opacity:0;
animation:faisca 1s infinite ease-out;
}

.fa2{animation-delay:.18s}
.fa3{animation-delay:.36s}

@keyframes faisca{
0%{opacity:0;transform:translate(0,0) scale(.7)}
30%{opacity:1}
100%{opacity:0;transform:translate(10px,-16px) scale(1.15)}
}

.moeda1,.moeda2,.moeda3{
opacity:0;
animation:moedaVoando 1.8s infinite ease-out;
transform-origin:center;
}

.moeda2{animation-delay:.35s}
.moeda3{animation-delay:.7s}

@keyframes moedaVoando{
0%{opacity:0;transform:translate(0,0) scale(.7)}
25%{opacity:1}
100%{opacity:0;transform:translate(-120px,-12px) scale(1)}
}

.barraBox{
margin-top:14px;
height:11px;
background:rgba(255,255,255,0.14);
border-radius:999px;
overflow:hidden;
}

.barra{
height:100%;
background:linear-gradient(90deg,#ffd700,#f7c948);
animation:barraMinerando 2.6s infinite linear;
border-radius:999px;
}

@keyframes barraMinerando{
0%{width:0%}
100%{width:100%}
}

.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
font-weight:500;
}

.depositar{
background:#1e4ea1;
color:white;
}

.sacar{
background:#1faa59;
color:white;
}

.notif{
background:#444;
color:white;
position:relative;
}

.sair{
background:#1e4ea1;
color:white;
width:100%;
margin-top:10px;
}

.badge{
position:absolute;
top:-8px;
right:-8px;
background:#ff2d2d;
color:white;
min-width:20px;
height:20px;
border-radius:999px;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
padding:0 6px;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.oculto{
display:none;
}

.pendente{
color:orange;
font-weight:bold;
}

.extratoItem{
padding:12px 0;
border-bottom:1px solid #eee;
line-height:1.6;
}

.extratoItem:last-child{
border-bottom:none;
}
</style>
</head>
<body>

<!-- CARD 1 -->
<div class="card">
<div id="nome" class="nome">Carregando...</div>
<div id="saldo" class="saldo">R$ 0,00</div>
</div>

<!-- CARD 2 -->
<div class="card mineracaoCard">
<div class="mineracaoTitulo">⛏️ Minerando lucros...</div>

<svg class="caverna" viewBox="0 0 430 230" xmlns="http://www.w3.org/2000/svg">

<!-- carrinho -->

  <circle cx="208" cy="88" r="28" fill="#f6d7b5"/>

  <path d="M198 99 Q208 106 218 99" fill="none" stroke="#d45545" stroke-width="4" stroke-linecap="round"/>

  <circle cx="231" cy="97" r="4" fill="#ee9f92"/>

  <path d="M191 101 L191 123 L199 123 L199 108 L217 108 L217 123 L225 123 L225 101" fill="#1e1e24"/>

  <!-- capacete -->
  <path d="M176 70 Q208 42 240 70 L244 80 L172 80 Z" fill="#ef9b52" stroke="#22252c" stroke-width="4"/>

  <rect x="203" y="50" width="10" height="29" fill="#22252c"/>
  <circle cx="208" cy="80" r="10" fill="#89dceb" stroke="#22252c" stroke-width="4"/>

  <!-- corpo -->
  <rect x="185" y="122" width="46" height="52" rx="8" fill="#ef9b52" stroke="#22252c" stroke-width="4"/>

    <line x1="295" y1="96" x2="314" y2="116" stroke="#5e6068" stroke-width="8" stroke-linecap="round"/>
    <line x1="304" y1="94" x2="325" y2="115" stroke="#3d3f46" stroke-width="8" stroke-linecap="round"/>
  </g>

</g>

<!-- pedra -->
<g class="pedra">
  <path d="M315 176 L342 126 L401 146 L375 186 Z" fill="#6d6d72"/>

</g>

<!-- faíscas -->

<circle class="moeda1" cx="348" cy="115" r="7" fill="#ffd700"/>
<circle class="moeda2" cx="363" cy="119" r="7" fill="#ffd700"/>
<circle class="moeda3" cx="334" cy="111" r="7" fill="#ffd700"/>

</svg>

<div class="barraBox">
<div class="barra"></div>
</div>
</div>

<!-- CARD 3 -->
<div class="card">
<div class="botoes">
<button class="depositar" onclick="irDeposito()">Depositar</button>
<button class="sacar" onclick="irSaque()">Sacar</button>
<button class="notif" onclick="abrirNotificacoes()">
Notificações
<span id="badge" class="badge oculto">0</span>
</button>
</div>

<button class="sair" onclick="logout()">Sair</button>
</div>

<!-- CARD 4 -->
<div class="card">
<h3>Extrato</h3>
<div id="extrato">Carregando...</div>
</div>

<script>
let usuario = null
let saldoAtual = 0
let rendimentoPorMinuto = 0
let timerSaldo = null

function formatarReal(v){
return Number(v || 0).toLocaleString("pt-BR",{
minimumFractionDigits:2,
maximumFractionDigits:2
})
}

function calcularRendimentoPorMinuto(saldo){
return ((Number(saldo || 0) * 0.20) / 30 / 24 / 60)
}

function horarioBrasil(data){
return new Date(data).toLocaleString("pt-BR",{
timeZone:"America/Sao_Paulo"
})
}

function atualizarSaldoNaTela(){
document.getElementById("saldo").innerText = "R$ " + formatarReal(saldoAtual)
}

function iniciarLoopSaldo(){
if(timerSaldo){
clearInterval(timerSaldo)
}

timerSaldo = setInterval(()=>{
saldoAtual = Number(saldoAtual) + Number(rendimentoPorMinuto)
atualizarSaldoNaTela()
},60000)
}

async function verificarLogin(){
const { data, error } = await sb.auth.getSession()

if(error || !data.session){
location.href = "login.html"
return false
}

usuario = data.session.user
return true
}

async function carregarPerfil(){
const { data, error } = await sb
.from("profiles")
.select("*")
.eq("id", usuario.id)
.single()

if(error || !data) return

document.getElementById("nome").innerText = data.nome
saldoAtual = Number(data.saldo || 0)
rendimentoPorMinuto = calcularRendimentoPorMinuto(saldoAtual)

atualizarSaldoNaTela()
iniciarLoopSaldo()
}

async function carregarExtrato(){
const { data, error } = await sb
.from("transacoes")
.select("*")
.eq("usuario_id", usuario.id)
.eq("status", "pendente")
.order("created_at", { ascending:false })

if(error){
document.getElementById("extrato").innerHTML = "Erro ao carregar extrato."
return
}

if(!data || data.length === 0){
document.getElementById("extrato").innerHTML = "Nenhuma solicitação pendente."
return
}

let html = ""

data.forEach(t => {
html += `
<div class="extratoItem">
<b>${t.tipo}</b><br>
Valor: R$ ${formatarReal(t.valor)}<br>
Status: <span class="pendente">${t.status}</span><br>
${horarioBrasil(t.created_at)}
</div>
`
})

document.getElementById("extrato").innerHTML = html
}

async function verificarNotificacoes(){
const { count, error } = await sb
.from("notificacoes")
.select("*", { count:"exact", head:true })
.eq("usuario_id", usuario.id)
.eq("lida", false)

if(error) return

const badge = document.getElementById("badge")

if(count && count > 0){
badge.innerText = count > 99 ? "99+" : count
badge.classList.remove("oculto")
}else{
badge.classList.add("oculto")
}
}

function abrirNotificacoes(){
location.href = "notificacoes.html"
}

function irDeposito(){
location.href = "deposito.html"
}

function irSaque(){
location.href = "saque.html"
}

async function logout(){
await sb.auth.signOut()
location.href = "login.html"
}

async function iniciar(){
const ok = await verificarLogin()
if(!ok) return

await carregarPerfil()
await carregarExtrato()
await verificarNotificacoes()
}

iniciar()
</script>

</body>
</html>
