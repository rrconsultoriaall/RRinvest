<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - RRinvest</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<link rel="stylesheet" href="style.css?v=60">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>
<body>

<div class="app">

  <div class="topbar">
    <div>
      <div class="brand">RRinvest</div>
      <div class="brand-sub">Acesso ao sistema</div>
    </div>
    <div class="premium-badge">Login</div>
  </div>

  <div class="card">
    <div class="card-title">Entrar</div>
    <div class="card-subtitle">Use seu e-mail e senha para acessar.</div>

    <div class="form-group">
      <input type="email" id="email" placeholder="Seu e-mail">
    </div>

    <div class="form-group">
      <input type="password" id="senha" placeholder="Sua senha">
    </div>

    <button class="btn btn-deposito" style="width:100%" onclick="fazerLogin()">
      <span class="material-symbols-rounded icon">login</span>
      Entrar
    </button>

    <div id="mensagem" class="vazio" style="margin-top:12px;"></div>
  </div>

</div>

<script>
async function fazerLogin(){
  const email = document.getElementById("email").value.trim()
  const senha = document.getElementById("senha").value.trim()
  const msg = document.getElementById("mensagem")

  msg.innerText = ""

  if(!email || !senha){
    msg.innerText = "Preencha e-mail e senha."
    return
  }

  const { data, error } = await sb.auth.signInWithPassword({
    email,
    password: senha
  })

  if(error || !data.user){
    msg.innerText = "E-mail ou senha inválidos."
    return
  }

  const userId = data.user.id

  const { data: perfil, error: erroPerfil } = await sb
    .from("profiles")
    .select("admin")
    .eq("id", userId)
    .single()

  if(erroPerfil || !perfil){
    msg.innerText = "Perfil não encontrado."
    return
  }

  if(perfil.admin === true){
    location.href = "admin.html"
  }else{
    location.href = "index.html"
  }
}

async function verificarSessaoAtual(){
  const { data } = await sb.auth.getSession()

  if(!data.session) return

  const userId = data.session.user.id

  const { data: perfil } = await sb
    .from("profiles")
    .select("admin")
    .eq("id", userId)
    .single()

  if(perfil?.admin === true){
    location.href = "admin.html"
  }else{
    location.href = "index.html"
  }
}

verificarSessaoAtual()
</script>

</body>
</html>
