<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin - RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f3f3f3;
padding:20px;
margin:0;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
}

button{
padding:14px 16px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-top:10px;
margin-right:10px;
background:#1e4ea1;
color:white;
width:100%;
}

.btn-sair{
background:#d9534f;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:12px;
}

.msg{
font-weight:bold;
margin-top:10px;
color:#c0392b;
}
</style>
</head>
<body>

<div class="card">
<h1>Painel Admin</h1>

<div class="grid">
<button onclick="irDepositos()">Depósitos pendentes</button>
<button onclick="irSaques()">Saques pendentes</button>
<button onclick="irClientes()">Clientes</button>
<button class="btn-sair" onclick="logout()">Sair</button>
</div>

<div id="msg" class="msg"></div>
</div>

<script>
async function verificarLogin(){
const { data, error } = await sb.auth.getSession()

if(error || !data.session){
location.href = "login.html"
return false
}

return true
}

function irDepositos(){
location.href = "admin_depositos.html"
}

function irSaques(){
location.href = "admin_saques.html"
}

function irClientes(){
location.href = "admin_clientes.html"
}

async function logout(){
await sb.auth.signOut()
location.href = "login.html"
}

async function iniciar(){
await verificarLogin()
}

iniciar()
</script>
</body>
</html>
