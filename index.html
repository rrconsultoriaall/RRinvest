<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:24px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 4px 18px rgba(0,0,0,0.08);
text-align:center;
}

.nome{
font-size:22px;
font-weight:bold;
}

.saldo{
font-size:46px;
font-weight:bold;
color:#0b3d91;
margin-top:8px;
}

.tituloMineracao{
font-weight:bold;
margin-bottom:10px;
font-size:18px;
}

.caverna{
border-radius:16px;
overflow:hidden;
background:#111;
}

svg{
width:100%;
max-width:400px;
}

.picareta{
transform-origin:210px 100px;
animation:bate 0.7s infinite alternate ease-in-out;
}

@keyframes bate{
0%{transform:rotate(-18deg)}
100%{transform:rotate(12deg)}
}

.pedra{
animation:pedra 0.7s infinite alternate ease-in-out;
}

@keyframes pedra{
0%{transform:translateX(0px)}
100%{transform:translateX(3px)}
}

.racha{
opacity:0.3;
animation:racha 1s infinite alternate;
}

@keyframes racha{
0%{opacity:0.2}
100%{opacity:0.6}
}

.particula{
opacity:0;
animation:particula 1s infinite;
}

@keyframes particula{
0%{opacity:0; transform:translateY(0)}
40%{opacity:1}
100%{opacity:0; transform:translateY(-15px)}
}

.moeda{
opacity:0;
animation:moeda 2s infinite;
}

@keyframes moeda{
0%{opacity:0; transform:translateY(0)}
40%{opacity:1}
100%{opacity:0; transform:translateY(-40px)}
}

.m1{animation-delay:0s}
.m2{animation-delay:0.4s}
.m3{animation-delay:0.8s}

.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.depositar{
background:#1e4ea1;
color:white;
}

.sacar{
background:#1faa59;
color:white;
}

.notif{
background:#444;
color:white;
position:relative;
}

.sair{
background:#1e4ea1;
color:white;
width:100%;
margin-top:10px;
}

.badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
width:18px;
height:18px;
border-radius:50%;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
}

.oculto{
display:none;
}

.pendente{
color:orange;
font-weight:bold;
}

</style>

</head>
<body>

<!-- CARD 1 -->
<div class="card">

<div class="nome" id="nome">Carregando...</div>

<div class="saldo" id="saldo">R$ 0,00</div>

</div>

<!-- CARD 2 ANIMAÇÃO -->
<div class="card">

<div class="tituloMineracao">
⛏️ Minerando lucros...
</div>

<div class="caverna">

<svg viewBox="0 0 400 220">

<radialGradient id="luz" cx="50%" cy="50%" r="70%">
<stop offset="0%" stop-color="#2a2a2a"/>
<stop offset="100%" stop-color="#111"/>
</radialGradient>

<rect x="0" y="0" width="400" height="220" fill="url(#luz)" rx="20"/>

<!-- chão -->
<rect x="0" y="170" width="400" height="60" fill="#2a2a2a"/>

<!-- pedra -->
<polygon class="pedra"
points="270,165 300,110 350,130 330,175"
fill="#777"/>

<!-- rachadura -->
<polyline class="racha"
points="300,120 305,135 295,150"
stroke="#444"
stroke-width="2"
fill="none"/>

<!-- mineiro cabeça -->
<circle cx="160" cy="110" r="14" fill="#ffd7b0"/>

<!-- capacete -->
<rect x="145" y="95" width="30" height="10" fill="#f3c642"/>

<!-- corpo -->
<rect x="153" y="120" width="14" height="28" fill="#2f6cd1"/>

<!-- braço -->
<line x1="160" y1="130" x2="210" y2="100"
stroke="#ffd7b0"
stroke-width="6"/>

<!-- picareta -->
<g class="picareta">
<line x1="210" y1="100" x2="240" y2="85"
stroke="#8b5a2b"
stroke-width="5"/>

<line x1="238" y1="80" x2="255" y2="95"
stroke="#ccc"
stroke-width="5"/>
</g>

<!-- partículas -->
<circle class="particula" cx="300" cy="120" r="3" fill="#ffd700"/>
<circle class="particula" cx="310" cy="130" r="3" fill="#ffd700"/>
<circle class="particula" cx="295" cy="135" r="3" fill="#ffd700"/>

<!-- moedas -->
<circle class="moeda m1" cx="310" cy="105" r="6" fill="#ffd700"/>
<circle class="moeda m2" cx="320" cy="110" r="6" fill="#ffd700"/>
<circle class="moeda m3" cx="300" cy="100" r="6" fill="#ffd700"/>

</svg>

</div>

</div>

<!-- CARD 3 BOTÕES -->
<div class="card">

<div class="botoes">

<button class="depositar" onclick="irDeposito()">
Depositar
</button>

<button class="sacar" onclick="irSaque()">
Sacar
</button>

<button class="notif" onclick="toggleNotificacoes()">
Notificações
<span id="badge" class="badge oculto">!</span>
</button>

</div>

<button class="sair" onclick="logout()">
Sair
</button>

</div>

<!-- CARD 4 EXTRATO -->
<div class="card">

<h3>Extrato</h3>

<div id="extrato">
Carregando...
</div>

</div>

<script>

let usuario=null

function formatarReal(v){
return Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

function horarioBrasil(data){
return new Date(data).toLocaleString("pt-BR",{timeZone:"America/Sao_Paulo"})
}

async function verificarLogin(){

const {data,error}=await sb.auth.getSession()

if(error || !data.session){

location.href="login.html"
return false

}

usuario=data.session.user
return true

}

async function carregarPerfil(){

const {data}=await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.single()

document.getElementById("nome").innerText=data.nome
document.getElementById("saldo").innerText="R$ "+formatarReal(data.saldo)

}

async function carregarExtrato(){

const {data}=await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.eq("status","pendente")
.order("created_at",{ascending:false})

if(!data || data.length==0){

document.getElementById("extrato").innerHTML="Nenhuma solicitação pendente."
return

}

let html=""

data.forEach(t=>{

html+=`

<p>

<b>${t.tipo}</b><br>

Valor: R$ ${formatarReal(t.valor)}<br>

Status: <span class="pendente">${t.status}</span><br>

${horarioBrasil(t.created_at)}

</p>

<hr>

`

})

document.getElementById("extrato").innerHTML=html

}

function irDeposito(){
location.href="deposito.html"
}

function irSaque(){
location.href="saque.html"
}

async function logout(){

await sb.auth.signOut()
location.href="login.html"

}

async function iniciar(){

const ok=await verificarLogin()

if(!ok) return

await carregarPerfil()

await carregarExtrato()

}

iniciar()

</script>

</body>
</html>
