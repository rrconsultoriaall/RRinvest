<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f3f3f3;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:12px;
border:none;
border-radius:6px;
background:#1e4ea1;
color:white;
margin-right:5px;
}

.aprovado{
color:green;
}

.pendente{
color:orange;
}

</style>

</head>

<body>

<div class="card">

<h2 id="nome">...</h2>

<p id="saldo"></p>

<button onclick="irDeposito()">Depositar</button>
<button onclick="irSaque()">Sacar</button>
<button onclick="logout()">Sair</button>

</div>

<div class="card">

<h3>Extrato</h3>

<div id="extrato"></div>

</div>

<script>

let usuario

function horarioBrasil(data){

return new Date(data).toLocaleString(
"pt-BR",
{timeZone:"America/Sao_Paulo"}
)

}

async function iniciar(){

const { data:{ session } } = await sb.auth.getSession()

if(!session){

location.href="login.html"
return

}

usuario=session.user

carregarPerfil()
carregarExtrato()

}

async function carregarPerfil(){

let { data } = await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.single()

document.getElementById("nome").innerText=data.nome
document.getElementById("saldo").innerText="Saldo: R$ "+data.saldo

}

async function carregarExtrato(){

let { data } = await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.order("created_at",{ascending:false})

let html=""

if(!data || data.length==0){

html="Nenhuma movimentação"

}else{

data.forEach(t=>{

let cor = t.status=="aprovado" ? "aprovado" : "pendente"

html+=`

<p>

<b>${t.tipo}</b><br>
Valor: R$ ${t.valor}<br>
Status: <span class="${cor}">${t.status}</span><br>
${horarioBrasil(t.created_at)}

</p>

<hr>

`

})

}

document.getElementById("extrato").innerHTML=html

}

function irDeposito(){

location.href="deposito.html"

}

function irSaque(){

location.href="saque.html"

}

async function logout(){

await sb.auth.signOut()

location.href="login.html"

}

iniciar()

</script>

</body>
</html>
