<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:22px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
text-align:center;
}

.nome{
font-size:22px;
font-weight:bold;
}

.saldo{
font-size:54px;
font-weight:bold;
color:#0b3d91;
margin-top:12px;
}

.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.depositar{
background:#1e4ea1;
color:white;
}

.sacar{
background:#1faa59;
color:white;
}

.notif{
background:#444;
color:white;
position:relative;
}

.sair{
background:#1e4ea1;
color:white;
width:100%;
margin-top:10px;
}

.badge{
position:absolute;
top:-8px;
right:-8px;
background:red;
color:white;
font-size:12px;
padding:4px 6px;
border-radius:20px;
}

.extratoItem{
padding:10px 0;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<!-- CARD SALDO -->

<div class="card">
<div id="nome" class="nome">Carregando...</div>
<div id="saldo" class="saldo">R$ 0,00</div>
</div>


<!-- CARD BOTÕES -->

<div class="card">

<div class="botoes">
<button class="depositar" onclick="location.href='deposito.html'">Depositar</button>
<button class="sacar" onclick="location.href='saque.html'">Sacar</button>

<button class="notif" onclick="location.href='notificacoes.html'">
Notificações
<span id="badge" class="badge" style="display:none">0</span>
</button>

</div>

<button class="sair" onclick="logout()">Sair</button>

</div>


<!-- CARD EXTRATO -->

<div class="card">
<h3>Extrato</h3>
<div id="extrato">Carregando...</div>
</div>


<script>

let usuario=null

function formatarReal(v){
return Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

async function iniciar(){

const {data}=await sb.auth.getSession()

if(!data.session){
location.href="login.html"
return
}

usuario=data.session.user

const perfil=await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.single()

document.getElementById("nome").innerText=perfil.data.nome
document.getElementById("saldo").innerText="R$ "+formatarReal(perfil.data.saldo)

carregarExtrato()
verificarNotificacoes()

}

async function carregarExtrato(){

const {data}=await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.eq("status","pendente")

if(!data.length){
document.getElementById("extrato").innerHTML="Nenhuma solicitação pendente."
return
}

let html=""

data.forEach(t=>{
html+=`
<div class="extratoItem">
<b>${t.tipo}</b><br>
R$ ${formatarReal(t.valor)}
</div>
`
})

document.getElementById("extrato").innerHTML=html

}

async function verificarNotificacoes(){

const {count}=await sb
.from("notificacoes")
.select("*",{count:"exact",head:true})
.eq("usuario_id",usuario.id)
.eq("lida",false)

if(count>0){
const badge=document.getElementById("badge")
badge.style.display="block"
badge.innerText=count
}

}

async function logout(){
await sb.auth.signOut()
location.href="login.html"
}

iniciar()

</script>

</body>
</html>
