<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RRinvest</title>

<link rel="manifest" href="/RRinvest/manifest.json">
<meta name="theme-color" content="#1d4ed8">

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

/* SPLASH */

.splash-screen{
position:fixed;
inset:0;
z-index:9999;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:linear-gradient(135deg,#1d4ed8,#2563eb,#4f7cff);
transition:opacity .3s;
}

.splash-screen.hide{
opacity:0;
pointer-events:none;
}

.splash-logo{
width:110px;
height:110px;
border-radius:26px;
background:rgba(255,255,255,0.15);
display:flex;
align-items:center;
justify-content:center;
margin-bottom:18px;
}

.splash-logo img{
width:70px;
}

.splash-title{
color:#fff;
font-size:32px;
font-weight:800;
}

.install-btn{
display:none;
margin-bottom:20px;
}

.install-btn.show{
display:flex;
}

</style>

</head>

<body>

<!-- SPLASH -->

<div id="splashScreen" class="splash-screen">

<div class="splash-logo">
<img src="/RRinvest/icons/icon-192.png">
</div>

<div class="splash-title">RRinvest</div>

</div>

<div class="app">

<div class="topbar">

<div>
<div class="brand">RRinvest</div>
<div class="brand-sub">Acesso ao sistema</div>
</div>

<div class="premium-badge">Login</div>

</div>

<button id="installBtn" class="btn btn-xadrez install-btn">

<span class="material-symbols-rounded icon">download</span>

Instalar app

</button>

<div class="card">

<div class="card-title">Entrar</div>

<div class="card-subtitle">Use seu e-mail e senha para acessar.</div>

<div class="form-group">

<input id="loginEmail" type="email" placeholder="Seu e-mail">

</div>

<div class="form-group">

<input id="loginSenha" type="password" placeholder="Sua senha">

</div>

<button class="btn btn-deposito" onclick="login()">

<span class="material-symbols-rounded icon">login</span>

Entrar

</button>

<hr style="margin:20px 0">

<div class="card-title">Criar conta</div>

<div class="card-subtitle">Cadastre-se para começar</div>

<div class="form-group">

<input id="cadNome" placeholder="Seu nome">

</div>

<div class="form-group">

<input id="cadTelefone" placeholder="Telefone">

</div>

<div class="form-group">

<input id="cadEmail" placeholder="Seu e-mail">

</div>

<div class="form-group">

<input id="cadSenha" type="password" placeholder="Crie uma senha">

</div>

<button class="btn btn-xadrez" onclick="criarConta()">

<span class="material-symbols-rounded icon">person_add</span>

Criar conta

</button>

</div>

</div>

<script>

let deferredPrompt = null

function esconderSplash(){

document.getElementById("splashScreen").classList.add("hide")

}

setTimeout(esconderSplash,1200)

/* INSTALAR APP */

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault()

deferredPrompt=e

document.getElementById("installBtn").classList.add("show")

})

document.getElementById("installBtn").addEventListener("click",async()=>{

if(!deferredPrompt)return

deferredPrompt.prompt()

await deferredPrompt.userChoice

deferredPrompt=null

})

/* LOGIN */

async function login(){

const email=document.getElementById("loginEmail").value

const senha=document.getElementById("loginSenha").value

const { error } = await sb.auth.signInWithPassword({

email:email,

password:senha

})

if(error){

alert("Erro no login")

return

}

location.href="index.html"

}

/* CRIAR CONTA */

async function criarConta(){

const nome=document.getElementById("cadNome").value
const telefone=document.getElementById("cadTelefone").value
const email=document.getElementById("cadEmail").value
const senha=document.getElementById("cadSenha").value

if(!nome||!telefone||!email||!senha){

alert("Preencha todos os campos")

return

}

const { data, error } = await sb.auth.signUp({

email:email,
password:senha

})

if(error){

alert("Erro ao criar conta")

return

}

await sb.from("profiles").insert({

id:data.user.id,
nome:nome,
telefone:telefone,
saldo:0,
admin:false

})

alert("Conta criada!")

}

</script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("/RRinvest/service-worker.js")

})

}

</script>

</body>
</html>
