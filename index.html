<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRinvest</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:22px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
text-align:center;
}

.nome{
font-size:22px;
font-weight:bold;
color:#111;
}

.saldo{
font-size:54px;
font-weight:bold;
color:#0b3d91;
margin-top:12px;
letter-spacing:-1px;
}

.rendimento{
margin-top:8px;
font-size:15px;
color:#666;
}

.mineracaoCard{
background:linear-gradient(180deg,#111 0%,#1a1a1a 100%);
color:white;
overflow:hidden;
position:relative;
}

.mineracaoTitulo{
font-size:18px;
font-weight:bold;
margin-bottom:14px;
}

.caverna{
width:100%;
max-width:420px;
margin:0 auto;
display:block;
}

.luz{
animation:luzPulse 2.4s infinite ease-in-out;
transform-origin:300px 92px;
}

@keyframes luzPulse{
0%,100%{opacity:.55}
50%{opacity:.9}
}

.picaretaGrupo{
transform-origin:180px 112px;
animation:picaretaBate 1s infinite ease-in-out;
}

@keyframes picaretaBate{
0%{transform:rotate(-12deg)}
45%{transform:rotate(6deg)}
100%{transform:rotate(-12deg)}
}

.pedra{
animation:pedraTreme 1s infinite ease-in-out;
transform-origin:310px 150px;
}

@keyframes pedraTreme{
0%,100%{transform:translateX(0)}
45%{transform:translateX(2px)}
}

.faisca1,.faisca2{
opacity:0;
animation:faisca 1.4s infinite ease-out;
}

.faisca2{animation-delay:.4s}

@keyframes faisca{
0%{opacity:0; transform:translate(0,0) scale(.8)}
30%{opacity:.8}
100%{opacity:0; transform:translate(6px,-10px) scale(1.1)}
}

.moeda1,.moeda2{
opacity:0;
animation:moedaSobe 2.2s infinite ease-out;
transform-origin:center;
}

.moeda2{animation-delay:.7s}

@keyframes moedaSobe{
0%{opacity:0; transform:translateY(8px) scale(.8)}
20%{opacity:1}
100%{opacity:0; transform:translateY(-26px) scale(1)}
}

.progressoBox{
margin-top:14px;
height:10px;
background:rgba(255,255,255,0.12);
border-radius:999px;
overflow:hidden;
}

.progressoBar{
height:100%;
width:35%;
background:linear-gradient(90deg,#f7c948,#ffd700);
border-radius:999px;
animation:barraLoop 3s infinite ease-in-out;
}

@keyframes barraLoop{
0%{width:18%}
50%{width:70%}
100%{width:18%}
}

.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
font-weight:500;
}

.depositar{
background:#1e4ea1;
color:white;
}

.sacar{
background:#1faa59;
color:white;
}

.notif{
background:#444;
color:white;
position:relative;
}

.sair{
background:#1e4ea1;
color:white;
width:100%;
margin-top:10px;
}

.badge{
position:absolute;
top:-8px;
right:-8px;
background:#ff2d2d;
color:white;
min-width:20px;
height:20px;
border-radius:999px;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
padding:0 6px;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.oculto{
display:none;
}

.pendente{
color:orange;
font-weight:bold;
}

.extratoItem{
padding:12px 0;
border-bottom:1px solid #eee;
line-height:1.6;
}

.extratoItem:last-child{
border-bottom:none;
}
</style>
</head>
<body>

<!-- CARD 1 -->
<div class="card">
<div id="nome" class="nome">Carregando...</div>
<div id="saldo" class="saldo">R$ 0,00</div>
<div id="rendimento" class="rendimento">Rendimento por minuto: R$ 0,00</div>
</div>

<!-- CARD 2 -->
<div class="card mineracaoCard">
<div class="mineracaoTitulo">⛏️ Minerando lucros...</div>

<svg class="caverna" viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
<rect x="0" y="0" width="420" height="220" rx="18" fill="#111"/>
<ellipse class="luz" cx="300" cy="92" rx="95" ry="60" fill="rgba(255,215,0,0.08)"/>
<rect x="25" y="168" width="370" height="38" rx="8" fill="#202225"/>

<!-- mineiro -->
<circle cx="140" cy="98" r="14" fill="#ffd7b0"/>
<rect x="126" y="83" width="28" height="10" rx="2" fill="#f4c542"/>
<rect x="132" y="112" width="16" height="34" fill="#2f6cd1"/>
<line x1="140" y1="124" x2="180" y2="108" stroke="#ffd7b0" stroke-width="7" stroke-linecap="round"/>

<g class="picaretaGrupo">
<line x1="180" y1="108" x2="210" y2="94" stroke="#8b5a2b" stroke-width="6" stroke-linecap="round"/>
<line x1="206" y1="88" x2="222" y2="103" stroke="#c9ced6" stroke-width="6" stroke-linecap="round"/>
</g>

<!-- pedra -->
<g class="pedra">
<polygon points="285,166 315,118 368,140 345,175" fill="#6d6d72"/>
<polyline points="320,128 327,142 316,160" stroke="#4a4a4f" stroke-width="3" fill="none" stroke-linecap="round"/>
</g>

<!-- faiscas -->
<circle class="faisca1" cx="305" cy="120" r="3" fill="#ffd700"/>
<circle class="faisca2" cx="315" cy="125" r="3" fill="#ffd700"/>

<!-- moedas -->
<circle class="moeda1" cx="330" cy="118" r="7" fill="#ffd700"/>
<circle class="moeda2" cx="345" cy="122" r="7" fill="#ffd700"/>
</svg>

<div class="progressoBox">
<div class="progressoBar"></div>
</div>
</div>

<!-- CARD 3 -->
<div class="card">
<div class="botoes">
<button class="depositar" onclick="irDeposito()">Depositar</button>
<button class="sacar" onclick="irSaque()">Sacar</button>
<button class="notif" onclick="abrirNotificacoes()">
Notificações
<span id="badge" class="badge oculto">0</span>
</button>
</div>

<button class="sair" onclick="logout()">Sair</button>
</div>

<!-- CARD 4 -->
<div class="card">
<h3>Extrato</h3>
<div id="extrato">Carregando...</div>
</div>

<script>
let usuario = null
let saldoAtual = 0
let rendimentoPorMinuto = 0
let timerSaldo = null

function formatarReal(v){
return Number(v || 0).toLocaleString("pt-BR",{
minimumFractionDigits:2,
maximumFractionDigits:2
})
}

function horarioBrasil(data){
return new Date(data).toLocaleString("pt-BR",{
timeZone:"America/Sao_Paulo"
})
}

function chaveSaldo(){
return "rrinvest_saldo_" + usuario.id
}

function chaveTempo(){
return "rrinvest_tempo_" + usuario.id
}

function calcularRendimentoPorMinuto(saldo){
return ((Number(saldo || 0) * 0.20) / 30 / 24 / 60)
}

function salvarSaldoLocal(valor){
localStorage.setItem(chaveSaldo(), String(valor))
localStorage.setItem(chaveTempo(), String(Date.now()))
}

function atualizarSaldoNaTela(){
document.getElementById("saldo").innerText = "R$ " + formatarReal(saldoAtual)
document.getElementById("rendimento").innerText = "Rendimento por minuto: R$ " + formatarReal(rendimentoPorMinuto)
}

function iniciarLoopSaldo(){
if(timerSaldo){
clearInterval(timerSaldo)
}

timerSaldo = setInterval(()=>{
saldoAtual = Number(saldoAtual) + Number(rendimentoPorMinuto)
salvarSaldoLocal(saldoAtual)
atualizarSaldoNaTela()
},60000)
}

async function verificarLogin(){
const { data, error } = await sb.auth.getSession()

if(error || !data.session){
location.href = "login.html"
return false
}

usuario = data.session.user
return true
}

async function carregarPerfil(){
const { data, error } = await sb
.from("profiles")
.select("*")
.eq("id", usuario.id)
.single()

if(error || !data) return

document.getElementById("nome").innerText = data.nome

saldoAtual = Number(data.saldo || 0)
rendimentoPorMinuto = calcularRendimentoPorMinuto(saldoAtual)

salvarSaldoLocal(saldoAtual)
atualizarSaldoNaTela()
iniciarLoopSaldo()
}

async function carregarExtrato(){
const { data, error } = await sb
.from("transacoes")
.select("*")
.eq("usuario_id", usuario.id)
.eq("status", "pendente")
.order("created_at", { ascending:false })

if(error){
document.getElementById("extrato").innerHTML = "Erro ao carregar extrato."
return
}

if(!data || data.length === 0){
document.getElementById("extrato").innerHTML = "Nenhuma solicitação pendente."
return
}

let html = ""

data.forEach(t => {
html += `
<div class="extratoItem">
<b>${t.tipo}</b><br>
Valor: R$ ${formatarReal(t.valor)}<br>
Status: <span class="pendente">${t.status}</span><br>
${horarioBrasil(t.created_at)}
</div>
`
})

document.getElementById("extrato").innerHTML = html
}

async function verificarNotificacoes(){
const { count, error } = await sb
.from("notificacoes")
.select("*", { count:"exact", head:true })
.eq("usuario_id", usuario.id)
.eq("lida", false)

if(error) return

const badge = document.getElementById("badge")

if(count && count > 0){
badge.innerText = count > 99 ? "99+" : count
badge.classList.remove("oculto")
}else{
badge.classList.add("oculto")
}
}

function abrirNotificacoes(){
location.href = "notificacoes.html"
}

function irDeposito(){
location.href = "deposito.html"
}

function irSaque(){
location.href = "saque.html"
}

async function logout(){
await sb.auth.signOut()
location.href = "login.html"
}

async function iniciar(){
const ok = await verificarLogin()
if(!ok) return

await carregarPerfil()
await carregarExtrato()
await verificarNotificacoes()
}

iniciar()
</script>

</body>
</html>
