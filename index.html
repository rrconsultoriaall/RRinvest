<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:22px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
text-align:center;
}

.nome{
font-size:22px;
font-weight:bold;
}

.saldo{
font-size:48px;
font-weight:bold;
color:#0b3d91;
margin-top:10px;
}

/* mineração */

.mineracao{
background:#0d0d0d;
border-radius:14px;
padding:20px;
color:white;
}

.mineracaoTitulo{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

.caverna{
border-radius:16px;
overflow:hidden;
}

/* animações */

.picareta{
transform-origin:230px 105px;
animation:bate 0.7s infinite alternate ease-in-out;
}

@keyframes bate{
0%{transform:rotate(-18deg)}
100%{transform:rotate(10deg)}
}

.pedra{
animation:pedra 0.7s infinite alternate ease-in-out;
}

@keyframes pedra{
0%{transform:translateX(0)}
100%{transform:translateX(3px)}
}

.moeda{
opacity:0;
animation:moeda 2s infinite;
}

.m1{animation-delay:0s}
.m2{animation-delay:.5s}
.m3{animation-delay:1s}

@keyframes moeda{
0%{
opacity:0;
transform:translateY(0);
}
40%{
opacity:1;
}
100%{
opacity:0;
transform:translateY(-40px);
}
}

/* botões */

.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.depositar{
background:#1e4ea1;
color:white;
}

.sacar{
background:#1faa59;
color:white;
}

.notif{
background:#444;
color:white;
position:relative;
}

.sair{
background:#1e4ea1;
color:white;
width:100%;
margin-top:10px;
}

.badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
width:18px;
height:18px;
border-radius:50%;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
}

.oculto{
display:none;
}

.pendente{
color:orange;
font-weight:bold;
}

</style>

</head>

<body>

<!-- CARD 1 SALDO -->

<div class="card">

<div id="nome" class="nome">Carregando...</div>

<div id="saldo" class="saldo">R$ 0,00</div>

</div>

<!-- CARD 2 MINERAÇÃO -->

<div class="card mineracao">

<div class="mineracaoTitulo">
⛏️ Minerando lucros...
</div>

<div class="caverna">

<svg viewBox="0 0 420 220">

<!-- fundo -->

<rect x="0" y="0" width="420" height="220" rx="20" fill="#0d0d0d"/>

<!-- chão -->

<rect x="0" y="170" width="420" height="50" fill="#1c1c1c"/>

<!-- pedra -->

<polygon class="pedra"
points="310,165 340,120 390,140 370,170"
fill="#666"/>

<!-- rachadura -->

<polyline
points="340,130 345,145 335,160"
stroke="#444"
stroke-width="2"
fill="none"/>

<!-- cabeça -->

<circle cx="180" cy="105" r="14" fill="#ffd7b0"/>

<!-- capacete -->

<rect x="165" y="90" width="30" height="10" fill="#f3c642"/>

<!-- corpo -->

<rect x="173" y="120" width="14" height="30" fill="#2f6cd1"/>

<!-- braço -->

<line x1="180" y1="130" x2="230" y2="105"
stroke="#ffd7b0"
stroke-width="6"/>

<!-- picareta -->

<g class="picareta">

<line x1="230" y1="105" x2="255" y2="90"
stroke="#8b5a2b"
stroke-width="5"/>

<line x1="252" y1="85" x2="268" y2="100"
stroke="#ccc"
stroke-width="5"/>

</g>

<!-- moedas -->

<circle class="moeda m1" cx="345" cy="110" r="6" fill="#ffd700"/>
<circle class="moeda m2" cx="360" cy="115" r="6" fill="#ffd700"/>
<circle class="moeda m3" cx="330" cy="105" r="6" fill="#ffd700"/>

</svg>

</div>

</div>

<!-- CARD 3 BOTÕES -->

<div class="card">

<div class="botoes">

<button class="depositar" onclick="irDeposito()">
Depositar
</button>

<button class="sacar" onclick="irSaque()">
Sacar
</button>

<button class="notif" onclick="abrirNotificacoes()">
Notificações
<span id="badge" class="badge oculto">!</span>
</button>

</div>

<button class="sair" onclick="logout()">
Sair
</button>

</div>

<!-- CARD 4 EXTRATO -->

<div class="card">

<h3>Extrato</h3>

<div id="extrato">
Carregando...
</div>

</div>

<script>

let usuario=null

function formatarReal(v){
return Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

async function verificarLogin(){

const {data}=await sb.auth.getSession()

if(!data.session){

location.href="login.html"
return false

}

usuario=data.session.user
return true

}

async function carregarPerfil(){

const {data}=await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.single()

document.getElementById("nome").innerText=data.nome
document.getElementById("saldo").innerText="R$ "+formatarReal(data.saldo)

}

async function carregarExtrato(){

const {data}=await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.eq("status","pendente")

if(!data || data.length==0){

document.getElementById("extrato").innerHTML=
"Nenhuma solicitação pendente."

return

}

let html=""

data.forEach(t=>{

html+=`

<p>

<b>${t.tipo}</b><br>

Valor: R$ ${formatarReal(t.valor)}<br>

Status: <span class="pendente">${t.status}</span>

</p>

<hr>

`

})

document.getElementById("extrato").innerHTML=html

}

async function verificarNotificacoes(){

const {data}=await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.eq("status","aprovado")
.eq("lido",false)

if(data && data.length>0){

document.getElementById("badge").classList.remove("oculto")

}

}

function abrirNotificacoes(){

location.href="notificacoes.html"

}

function irDeposito(){
location.href="deposito.html"
}

function irSaque(){
location.href="saque.html"
}

async function logout(){

await sb.auth.signOut()
location.href="login.html"

}

async function iniciar(){

const ok=await verificarLogin()

if(!ok) return

await carregarPerfil()

await carregarExtrato()

await verificarNotificacoes()

}

iniciar()

</script>

</body>
</html>
