<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:22px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
text-align:center;
}

.nome{
font-size:22px;
font-weight:bold;
}

.saldo{
font-size:48px;
font-weight:bold;
color:#0b3d91;
margin-top:10px;
}

/* mineração */

.mineracao{
background:#0d0d0d;
border-radius:14px;
padding:20px;
color:white;
}

.mineracaoTitulo{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

.cena{
display:flex;
align-items:center;
justify-content:space-around;
position:relative;
}

.mineiro{
width:130px;
animation:mineiro 0.9s infinite alternate ease-in-out;
}

@keyframes mineiro{
0%{transform:translateY(0px)}
100%{transform:translateY(-4px)}
}

.pedra{
width:90px;
animation:pedra 0.7s infinite alternate;
}

@keyframes pedra{
0%{transform:translateX(0)}
100%{transform:translateX(4px)}
}

.moeda{
position:absolute;
font-size:22px;
animation:moeda 2s infinite;
}

@keyframes moeda{
0%{
opacity:0;
transform:translateY(0);
}
40%{
opacity:1;
}
100%{
opacity:0;
transform:translateY(-45px);
}
}

.m1{left:55%; animation-delay:0s;}
.m2{left:60%; animation-delay:.7s;}
.m3{left:65%; animation-delay:1.3s;}

/* botões */

.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.depositar{
background:#1e4ea1;
color:white;
}

.sacar{
background:#1faa59;
color:white;
}

.notif{
background:#444;
color:white;
position:relative;
}

.sair{
background:#1e4ea1;
color:white;
width:100%;
margin-top:10px;
}

.badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
width:18px;
height:18px;
border-radius:50%;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
}

.oculto{
display:none;
}

.pendente{
color:orange;
font-weight:bold;
}

</style>

</head>

<body>

<!-- CARD 1 SALDO -->
<div class="card">

<div id="nome" class="nome">Carregando...</div>

<div id="saldo" class="saldo">R$ 0,00</div>

</div>

<!-- CARD 2 MINERAÇÃO -->
<div class="card mineracao">

<div class="mineracaoTitulo">
⛏️ Minerando lucros...
</div>

<div class="cena">

<img src="./minerador.png" class="mineiro">

<img src="https://cdn-icons-png.flaticon.com/512/809/809957.png"
class="pedra">

<div class="moeda m1">💰</div>
<div class="moeda m2">💰</div>
<div class="moeda m3">💰</div>

</div>

</div>

<!-- CARD 3 BOTÕES -->
<div class="card">

<div class="botoes">

<button class="depositar" onclick="irDeposito()">
Depositar
</button>

<button class="sacar" onclick="irSaque()">
Sacar
</button>

<button class="notif" onclick="abrirNotificacoes()">
Notificações
<span id="badge" class="badge oculto">!</span>
</button>

</div>

<button class="sair" onclick="logout()">
Sair
</button>

</div>

<!-- CARD 4 EXTRATO -->
<div class="card">

<h3>Extrato</h3>

<div id="extrato">
Carregando...
</div>

</div>

<script>

let usuario=null

function formatarReal(v){
return Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

async function verificarLogin(){

const {data}=await sb.auth.getSession()

if(!data.session){

location.href="login.html"
return false

}

usuario=data.session.user
return true

}

async function carregarPerfil(){

const {data}=await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.single()

document.getElementById("nome").innerText=data.nome
document.getElementById("saldo").innerText="R$ "+formatarReal(data.saldo)

}

async function carregarExtrato(){

const {data}=await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.eq("status","pendente")

if(!data || data.length==0){

document.getElementById("extrato").innerHTML=
"Nenhuma solicitação pendente."

return

}

let html=""

data.forEach(t=>{

html+=`

<p>

<b>${t.tipo}</b><br>

Valor: R$ ${formatarReal(t.valor)}<br>

Status: <span class="pendente">${t.status}</span>

</p>

<hr>

`

})

document.getElementById("extrato").innerHTML=html

}

async function verificarNotificacoes(){

const {data}=await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.eq("status","aprovado")
.eq("lido",false)

if(data && data.length>0){

document.getElementById("badge").classList.remove("oculto")

}

}

function abrirNotificacoes(){

location.href="notificacoes.html"

}

function irDeposito(){
location.href="deposito.html"
}

function irSaque(){
location.href="saque.html"
}

async function logout(){

await sb.auth.signOut()
location.href="login.html"

}

async function iniciar(){

const ok=await verificarLogin()

if(!ok) return

await carregarPerfil()

await carregarExtrato()

await verificarNotificacoes()

}

iniciar()

</script>

</body>
</html>
