<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
background:#f3f3f3;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
background:#1e4ea1;
color:white;
margin:5px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="card">

<h2 id="nome"></h2>
<p id="saldo"></p>

<button onclick="depositar()">Depositar</button>
<button onclick="sacar()">Sacar</button>
<button onclick="logout()">Sair</button>

</div>

<div class="card">

<h3>Extrato</h3>

<div id="extrato"></div>

</div>

<script>

const supabase = supabase.createClient(
"https://SEU_PROJETO.supabase.co",
"SUA_PUBLIC_ANON_KEY"
)

let user

function horarioBrasil(data){

return new Date(data).toLocaleString("pt-BR",{
timeZone:"America/Sao_Paulo"
})

}

async function iniciar(){

const {data:{session}} = await supabase.auth.getSession()

if(!session){

location.href="login.html"
return

}

user=session.user

carregarPerfil()
carregarExtrato()

}

async function carregarPerfil(){

let {data} = await supabase
.from("profiles")
.select("*")
.eq("id",user.id)
.single()

document.getElementById("nome").innerText=data.nome
document.getElementById("saldo").innerText="Saldo: R$ "+data.saldo

}

async function carregarExtrato(){

let {data} = await supabase
.from("transacoes")
.select("*")
.eq("usuario_id",user.id)
.eq("status","aprovado")
.order("created_at",{ascending:false})

let html=""

data.forEach(m=>{

html+=`

<p>

<b>${m.tipo}</b><br>
Valor: R$ ${m.valor}<br>
${m.descricao}<br>
${horarioBrasil(m.created_at)}

</p>

<hr>

`

})

document.getElementById("extrato").innerHTML=html

}

async function depositar(){

let valor = prompt("Valor do depósito")

if(!valor) return

await supabase
.from("transacoes")
.insert({

usuario_id:user.id,
usuario_email:user.email,
tipo:"deposito",
valor:valor,
descricao:"Depósito solicitado",
status:"pendente",
created_at:new Date().toISOString()

})

alert("Depósito solicitado. Aguarde aprovação.")

}

async function sacar(){

let valor = prompt("Valor do saque")

if(!valor) return

await supabase
.from("transacoes")
.insert({

usuario_id:user.id,
usuario_email:user.email,
tipo:"saque",
valor:valor,
descricao:"Saque solicitado",
status:"pendente",
created_at:new Date().toISOString()

})

alert("Saque solicitado.")

}

async function logout(){

await supabase.auth.signOut()

location.href="login.html"

}

iniciar()

</script>

</body>
</html>
