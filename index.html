<!-- EXTRATO -->

<div class="card">

<div class="card-title">Extrato</div>

<div id="extrato" class="extrato-lista">
<div class="vazio">Carregando...</div>
</div>

</div>


</div>



<script>

let usuario = null

let saldoBase = 0
let rendimentoPorSegundo = 0
let inicioRendimento = 0



function formatarReal(v){

return Number(v).toLocaleString("pt-BR",{
minimumFractionDigits:2,
maximumFractionDigits:2
})

}



function iniciarRendimento(saldoInicial){

saldoBase = Number(saldoInicial)

rendimentoPorSegundo = saldoBase * 0.20 / 30 / 24 / 60 / 60

inicioRendimento = Date.now()

atualizarSaldo()

setInterval(atualizarSaldo,100)

}



function atualizarSaldo(){

const agora = Date.now()

const segundos = (agora - inicioRendimento) / 1000

const crescimento = segundos * rendimentoPorSegundo

const saldoAtual = saldoBase + crescimento

document.getElementById("saldo").innerText =
"R$ " + formatarReal(saldoAtual)

}



async function verificarLogin(){

const {data,error} = await sb.auth.getSession()

if(error || !data.session){

location.href = "login.html"

return false

}

usuario = data.session.user

return true

}



async function carregarPerfil(){

const {data,error} = await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.single()

if(error || !data){

document.getElementById("nomeCliente").innerText = "Erro"

return

}

document.getElementById("nomeCliente").innerText =
data.nome || "Cliente"

iniciarRendimento(data.saldo || 0)

}



function abrirEstrategiaXadrez(){

const valor = document.getElementById("metaXadrez").value
const qtd = document.getElementById("qtdQuadrados").value

if(!valor){

alert("Digite o valor da meta")

return

}

localStorage.setItem("rrinvest_meta_xadrez",valor)
localStorage.setItem("rrinvest_qtd_xadrez",qtd)

location.href="estrategia_xadrez.html"

}



async function logout(){

await sb.auth.signOut()

location.href="login.html"

}



async function iniciar(){

const ok = await verificarLogin()

if(!ok) return

await carregarPerfil()

}

iniciar()

</script>
