<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RRinvest ADM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
font-family:Arial;
background:#f3f3f3;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

.aprovar{
background:#28a745;
color:white;
}

.sair{
background:#d9534f;
color:white;
}

</style>
</head>

<body>

<div class="card">
<h2>Admin RRinvest</h2>
<button class="sair" onclick="logout()">Sair</button>
</div>

<div class="card">
<h3>Depósitos pendentes</h3>
<div id="depositos"></div>
</div>

<div class="card">
<h3>Clientes</h3>
<div id="clientes"></div>
</div>

<div class="card">
<h3>Movimentações</h3>
<div id="movimentos"></div>
</div>

<script>

const supabase = supabase.createClient(
"https://SEU_PROJETO.supabase.co",
"SUA_PUBLIC_ANON_KEY"
)

function horarioBrasil(data){

return new Date(data).toLocaleString("pt-BR",{
timeZone:"America/Sao_Paulo"
})

}

async function carregarClientes(){

let {data} = await supabase
.from("profiles")
.select("*")

let html=""

data.forEach(c=>{

html+=`
<p>
<b>${c.nome}</b><br>
${c.email}<br>
Telefone: ${c.telefone}<br>
Saldo: R$ ${c.saldo}
</p>
<hr>
`

})

document.getElementById("clientes").innerHTML=html

}

async function carregarDepositos(){

let {data} = await supabase
.from("transacoes")
.select("*")
.eq("tipo","deposito")
.eq("status","pendente")

let html=""

data.forEach(d=>{

html+=`
<p>

<b>Depósito</b><br>
Usuário: ${d.usuario_email}<br>
Valor: R$ ${d.valor}<br>
Data: ${horarioBrasil(d.created_at)}<br><br>

<button class="aprovar" onclick="aprovar(${d.id},'${d.usuario_id}',${d.valor})">
Aprovar depósito
</button>

</p>
<hr>
`

})

document.getElementById("depositos").innerHTML=html

}

async function aprovar(id,usuario,valor){

await supabase
.from("transacoes")
.update({status:"aprovado"})
.eq("id",id)

let {data} = await supabase
.from("profiles")
.select("saldo")
.eq("id",usuario)
.single()

let novoSaldo = Number(data.saldo) + Number(valor)

await supabase
.from("profiles")
.update({saldo:novoSaldo})
.eq("id",usuario)

carregarDepositos()
carregarClientes()
carregarMovimentos()

}

async function carregarMovimentos(){

let {data} = await supabase
.from("transacoes")
.select("*")
.eq("status","aprovado")
.order("created_at",{ascending:false})

let html=""

data.forEach(m=>{

html+=`
<p>

<b>${m.tipo}</b><br>
Valor: R$ ${m.valor}<br>
${m.descricao}<br>
${horarioBrasil(m.created_at)}

</p>
<hr>
`

})

document.getElementById("movimentos").innerHTML=html

}

async function logout(){

await supabase.auth.signOut()
location.href="index.html"

}

carregarClientes()
carregarDepositos()
carregarMovimentos()

</script>

</body>
</html>
