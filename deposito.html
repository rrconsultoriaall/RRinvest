<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta http-equiv="Cache-Control" content="no-cache">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Depósito</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f3f3f3;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
}

button{
padding:12px;
border:none;
border-radius:6px;
background:#1e4ea1;
color:white;
width:100%;
margin-top:10px;
}

.pix{
background:#eef2ff;
padding:10px;
border-radius:6px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>Depósito</h2>

<p>Faça o PIX para:</p>

<div class="pix" id="pix">40223218812</div>

<button onclick="copiarPix()">Copiar PIX</button>

<input id="valor" placeholder="Valor do depósito">

<button onclick="depositar()">Solicitar depósito</button>

<button onclick="voltar()">Voltar</button>

</div>

<script>

let usuario

async function iniciar(){

const { data:{ session } } = await sb.auth.getSession()

usuario=session.user

}

function copiarPix(){

navigator.clipboard.writeText("40223218812")

alert("PIX copiado")

}

async function depositar(){

let valor=document.getElementById("valor").value

await sb.from("transacoes").insert({

usuario_id:usuario.id,
usuario_email:usuario.email,
tipo:"deposito",
valor:valor,
descricao:"Depósito solicitado",
status:"pendente",
created_at:new Date()

})

alert("Depósito solicitado")

location.href="index.html"

}

function voltar(){

location.href="index.html"

}

iniciar()

</script>

</body>
</html>
