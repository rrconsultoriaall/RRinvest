<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>

<h2>Painel Administrativo</h2>

<div id="conteudoAdmin" style="display:none">

<h3>Clientes</h3>
<div id="listaClientes"></div>

</div>

<script>

let usuario = null

async function verificarLogin(){

const { data, error } = await sb.auth.getSession()

if(error || !data.session){

location.href = "login.html"
return false

}

usuario = data.session.user
return true

}

async function verificarAdmin(){

const { data, error } = await sb
.from("profiles")
.select("admin")
.eq("id", usuario.id)
.single()

if(error || !data || data.admin !== true){

alert("Acesso negado")

location.href = "index.html"

return false

}

return true

}

async function carregarClientes(){

const { data, error } = await sb
.from("profiles")
.select("*")
.order("created_at",{ascending:false})

const lista = document.getElementById("listaClientes")

if(error){
lista.innerHTML = "Erro ao carregar"
return
}

let html = ""

data.forEach(cliente =>{

html += `
<div style="border:1px solid #ddd;padding:10px;margin-bottom:10px">
<strong>${cliente.nome || "Cliente"}</strong><br>
Saldo: R$ ${Number(cliente.saldo || 0).toFixed(2)}
</div>
`

})

lista.innerHTML = html

}

async function iniciar(){

const logado = await verificarLogin()

if(!logado) return

const admin = await verificarAdmin()

if(!admin) return

document.getElementById("conteudoAdmin").style.display = "block"

carregarClientes()

}

iniciar()

</script>

</body>
</html>
