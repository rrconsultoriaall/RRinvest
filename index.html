<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:24px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 4px 18px rgba(0,0,0,0.08);
text-align:center;
}

.nome{
font-size:22px;
font-weight:bold;
}

.saldo{
font-size:44px;
font-weight:bold;
color:#0b3d91;
margin-top:8px;
}

.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.depositar{
background:#1e4ea1;
color:white;
}

.sacar{
background:#1faa59;
color:white;
}

.notif{
background:#444;
color:white;
position:relative;
}

.sair{
background:#1e4ea1;
color:white;
width:100%;
margin-top:10px;
}

.badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
width:18px;
height:18px;
border-radius:50%;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
}

.caverna{
background:#1f1f1f;
border-radius:12px;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
height:160px;
position:relative;
overflow:hidden;
}

.mineiro{
position:absolute;
bottom:20px;
left:40%;
font-size:42px;
animation:minerando 0.7s infinite alternate;
}

@keyframes minerando{
from{transform:rotate(-20deg)}
to{transform:rotate(20deg)}
}

.pedra{
position:absolute;
bottom:20px;
right:40%;
font-size:34px;
animation:pedra 0.7s infinite alternate;
}

@keyframes pedra{
from{transform:translateX(0px)}
to{transform:translateX(4px)}
}

.moeda{
position:absolute;
font-size:20px;
animation:moeda 2s infinite;
}

@keyframes moeda{
0%{transform:translateY(0px);opacity:0}
50%{opacity:1}
100%{transform:translateY(-40px);opacity:0}
}

.m1{left:45%; bottom:60px; animation-delay:0s}
.m2{left:50%; bottom:70px; animation-delay:0.5s}
.m3{left:55%; bottom:65px; animation-delay:1s}

.pendente{
color:orange;
font-weight:bold;
}

.notificacao{
border-bottom:1px solid #eee;
padding:12px 0;
line-height:1.6;
}

.oculto{
display:none;
}

</style>

</head>

<body>

<!-- CARD 1 -->
<div class="card">

<div class="nome" id="nome">Carregando...</div>

<div class="saldo" id="saldo">R$ 0,00</div>

</div>

<!-- CARD 2 ANIMAÇÃO -->
<div class="card">

<div style="margin-bottom:10px;font-weight:bold">
⛏️ Minerando lucros...
</div>

<div class="caverna">

<div class="mineiro">⛏️</div>

<div class="pedra">🪨</div>

<div class="moeda m1">💰</div>
<div class="moeda m2">💰</div>
<div class="moeda m3">💰</div>

</div>

</div>

<!-- CARD 3 BOTÕES -->
<div class="card">

<div class="botoes">

<button class="depositar" onclick="irDeposito()">
Depositar
</button>

<button class="sacar" onclick="irSaque()">
Sacar
</button>

<button class="notif" onclick="toggleNotificacoes()">
Notificações
<span id="badge" class="badge oculto">!</span>
</button>

</div>

<button class="sair" onclick="logout()">
Sair
</button>

</div>

<!-- CARD 4 EXTRATO -->
<div class="card">

<h3>Extrato</h3>

<div id="extrato">
Carregando...
</div>

</div>

<script>

let usuario=null

function formatarReal(v){
return Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

function horarioBrasil(data){
return new Date(data).toLocaleString("pt-BR",{timeZone:"America/Sao_Paulo"})
}

async function verificarLogin(){

const {data,error}=await sb.auth.getSession()

if(error || !data.session){

location.href="login.html"
return false

}

usuario=data.session.user
return true

}

async function carregarPerfil(){

const {data}=await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.single()

document.getElementById("nome").innerText=data.nome

document.getElementById("saldo").innerText="R$ "+formatarReal(data.saldo)

}

async function carregarExtrato(){

const {data}=await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.eq("status","pendente")
.order("created_at",{ascending:false})

if(!data || data.length==0){

document.getElementById("extrato").innerHTML="Nenhuma solicitação pendente."
return

}

let html=""

data.forEach(t=>{

html+=`

<p>

<b>${t.tipo}</b><br>

Valor: R$ ${formatarReal(t.valor)}<br>

Status: <span class="pendente">${t.status}</span><br>

${horarioBrasil(t.created_at)}

</p>

<hr>

`

})

document.getElementById("extrato").innerHTML=html

}

async function carregarNotificacoes(){

const {data}=await sb
.from("notificacoes")
.select("*")
.eq("usuario_id",usuario.id)

if(!data) return

let nova=false

data.forEach(n=>{
if(!n.lida) nova=true
})

if(nova){
document.getElementById("badge").classList.remove("oculto")
}

}

function irDeposito(){
location.href="deposito.html"
}

function irSaque(){
location.href="saque.html"
}

async function logout(){

await sb.auth.signOut()
location.href="login.html"

}

async function iniciar(){

const ok=await verificarLogin()

if(!ok) return

await carregarPerfil()

await carregarExtrato()

await carregarNotificacoes()

}

iniciar()

</script>

</body>
</html>
