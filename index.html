<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:24px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 4px 18px rgba(0,0,0,0.08);
text-align:center;
}

.nome{
font-size:22px;
font-weight:bold;
}

.saldo{
font-size:44px;
font-weight:bold;
color:#0b3d91;
margin-top:8px;
display:none;
}

.mineracao{
margin-top:10px;
}

.mensagemMineracao{
font-size:16px;
color:#666;
margin-bottom:10px;
}

.mineiro{
font-size:46px;
display:inline-block;
animation:minerando 0.8s infinite alternate;
}

@keyframes minerando{
from{transform:rotate(-20deg)}
to{transform:rotate(20deg)}
}

.pedra{
font-size:36px;
display:inline-block;
margin-left:8px;
animation:pedra 0.8s infinite alternate;
}

@keyframes pedra{
from{transform:translateX(0px)}
to{transform:translateX(4px)}
}

.moedas{
font-size:22px;
margin-top:10px;
animation:moeda 1s infinite;
}

@keyframes moeda{
0%{opacity:0; transform:translateY(-10px)}
50%{opacity:1}
100%{opacity:0; transform:translateY(10px)}
}

.barra{
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progresso{
height:10px;
width:0%;
background:#1faa59;
animation:progressoMineracao 3s forwards;
}

@keyframes progressoMineracao{
0%{width:0%}
100%{width:100%}
}

.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.depositar{
background:#1e4ea1;
color:white;
}

.sacar{
background:#1faa59;
color:white;
}

.notif{
background:#444;
color:white;
position:relative;
}

.sair{
background:#1e4ea1;
color:white;
width:100%;
margin-top:10px;
}

.badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
width:18px;
height:18px;
border-radius:50%;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
}

.oculto{
display:none;
}

.pendente{
color:orange;
font-weight:bold;
}

.notificacao{
border-bottom:1px solid #eee;
padding:12px 0;
line-height:1.6;
}

</style>

</head>

<body>

<div class="card">

<div class="nome" id="nome">Carregando...</div>

<div class="saldo" id="saldo">R$ 0,00</div>

<div class="mineracao" id="mineracao">

<div class="mensagemMineracao">
⛏️ Minerando lucros...
</div>

<div>
<span class="mineiro">⛏️</span>
<span class="pedra">🪨</span>
</div>

<div class="moedas">
💰 💰 💰
</div>

<div class="barra">
<div class="progresso"></div>
</div>

</div>

<div class="botoes">

<button class="depositar" onclick="irDeposito()">
Depositar
</button>

<button class="sacar" onclick="irSaque()">
Sacar
</button>

<button class="notif" onclick="toggleNotificacoes()">
Notificações
<span id="badge" class="badge oculto">!</span>
</button>

</div>

<button class="sair" onclick="logout()">
Sair
</button>

</div>

<div class="card oculto" id="cardNotif">

<h3>Notificações</h3>

<div id="notificacoes">
Carregando...
</div>

</div>

<div class="card">

<h3>Extrato</h3>

<div id="extrato">
Carregando...
</div>

</div>

<script>

let usuario=null

function formatarReal(v){
return Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

function horarioBrasil(data){
return new Date(data).toLocaleString("pt-BR",{timeZone:"America/Sao_Paulo"})
}

async function verificarLogin(){

const {data,error}=await sb.auth.getSession()

if(error || !data.session){

location.href="login.html"
return false

}

usuario=data.session.user
return true

}

async function carregarPerfil(){

const {data}=await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.single()

document.getElementById("nome").innerText=data.nome

document.getElementById("saldo").innerText="R$ "+formatarReal(data.saldo)

}

async function carregarExtrato(){

const {data}=await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.eq("status","pendente")
.order("created_at",{ascending:false})

if(!data || data.length==0){

document.getElementById("extrato").innerHTML="Nenhuma solicitação pendente."
return

}

let html=""

data.forEach(t=>{

html+=`

<p>

<b>${t.tipo}</b><br>

Valor: R$ ${formatarReal(t.valor)}<br>

Status: <span class="pendente">${t.status}</span><br>

${horarioBrasil(t.created_at)}

</p>

<hr>

`

})

document.getElementById("extrato").innerHTML=html

}

async function carregarNotificacoes(){

const {data}=await sb
.from("notificacoes")
.select("*")
.eq("usuario_id",usuario.id)

if(!data) return

let nova=false

data.forEach(n=>{
if(!n.lida) nova=true
})

if(nova){
document.getElementById("badge").classList.remove("oculto")
}

}

async function marcarLidas(){

await sb
.from("notificacoes")
.update({lida:true})
.eq("usuario_id",usuario.id)
.eq("lida",false)

document.getElementById("badge").classList.add("oculto")

}

function toggleNotificacoes(){

const card=document.getElementById("cardNotif")

card.classList.toggle("oculto")

if(!card.classList.contains("oculto")){
marcarLidas()
}

}

function irDeposito(){
location.href="deposito.html"
}

function irSaque(){
location.href="saque.html"
}

async function logout(){

await sb.auth.signOut()
location.href="login.html"

}

async function iniciar(){

const ok=await verificarLogin()

if(!ok) return

await carregarPerfil()

await carregarExtrato()

await carregarNotificacoes()

setTimeout(()=>{

document.getElementById("mineracao").style.display="none"

document.getElementById("saldo").style.display="block"

},3000)

}

iniciar()

</script>

</body>
</html>
