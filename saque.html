<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saque - RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f8;
padding:20px;
margin:0;
}

.card{
background:white;
padding:24px;
border-radius:16px;
max-width:480px;
margin:40px auto;
box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

h2{
margin-top:0;
margin-bottom:20px;
font-size:40px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:10px;
box-sizing:border-box;
border:1px solid #d9d9d9;
border-radius:12px;
font-size:18px;
outline:none;
}

input:focus{
border-color:#1e4ea1;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:20px;
cursor:pointer;
margin-top:10px;
}

.btn-principal{
background:#0b3d91;
color:white;
}

.btn-secundario{
background:#e9eef7;
color:#0b3d91;
}

.msg{
margin-top:16px;
font-size:18px;
font-weight:bold;
text-align:center;
min-height:24px;
}

.ok{
color:#1f8f4e;
}

.erro{
color:#c0392b;
}
</style>
</head>
<body>

<div class="card">
<h2>Saque</h2>

<input id="valor" placeholder="Valor do saque">
<input id="pix" placeholder="Chave PIX">

<button class="btn-principal" onclick="sacar()">Solicitar saque</button>
<button class="btn-secundario" onclick="voltar()">Voltar</button>

<div class="msg" id="msg"></div>
</div>

<script>
let usuario = null

async function verificarLogin(){
const { data, error } = await sb.auth.getSession()

if(error || !data.session){
location.href = "login.html"
return false
}

usuario = data.session.user
return true
}

function mostrarMsg(texto,tipo=""){
const el = document.getElementById("msg")
el.className = "msg " + tipo
el.innerText = texto
}

async function sacar(){
const valor = document.getElementById("valor").value.trim()
const pix = document.getElementById("pix").value.trim()

if(!valor || !pix){
mostrarMsg("Preencha todos os campos","erro")
return
}

const { error } = await sb
.from("transacoes")
.insert({
usuario_id: usuario.id,
usuario_email: usuario.email,
tipo: "saque",
valor: valor,
descricao: "PIX: " + pix,
status: "pendente",
created_at: new Date().toISOString()
})

if(error){
mostrarMsg(error.message,"erro")
return
}

mostrarMsg("Saque solicitado com sucesso","ok")

setTimeout(()=>{
location.href = "index.html"
},800)
}

function voltar(){
location.href = "index.html"
}

async function iniciar(){
const ok = await verificarLogin()
if(!ok) return
}

iniciar()
</script>
</body>
</html>
