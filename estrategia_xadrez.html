<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estratégia Xadrez - RRinvest</title>

<link rel="stylesheet" href="style.css?v=120">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
.grid-xadrez{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:6px;
}

.quadrado{
background:#f2f2f2;
border-radius:8px;
padding:6px;
text-align:center;
cursor:pointer;
border:1px solid #ddd;
}

.quadrado.marcado{
background:#27ae60;
color:#fff;
border:none;
}

.numero{
font-size:12px;
opacity:.6;
}

.valor{
font-weight:700;
}
</style>

</head>
<body>

<div class="app">

<div class="topbar">
<div>
<div class="brand">RRinvest</div>
<div class="brand-sub">Estratégia Xadrez</div>
</div>
<div class="premium-badge">Premium</div>
</div>

<button class="btn btn-deposito" onclick="voltar()">
<span class="material-symbols-rounded icon">arrow_back</span>
Voltar
</button>

<button class="btn btn-xadrez" onclick="gerarNovo()">
<span class="material-symbols-rounded icon">refresh</span>
Atualizar
</button>

<button class="btn btn-saque" onclick="salvar()">
<span class="material-symbols-rounded icon">save</span>
Salvar
</button>

<div class="card">

<div class="card-subtitle">Saldo atual</div>
<div id="saldoAtual" class="saldo-valor">R$ 0,00</div>

</div>

<div class="card">

<div class="card-title">Estratégia Xadrez</div>

<div id="metaValor" class="saldo-valor" style="color:#27ae60;font-size:28px;">
R$ 0,00
</div>

<div id="grid" class="grid-xadrez"></div>

</div>

<div class="card">

<div>Saldo marcado: <strong id="marcado">R$ 0,00</strong></div>
<div>Falta marcar: <strong id="falta">R$ 0,00</strong></div>
<div>Quadrados marcados: <strong id="qtd">0</strong></div>

</div>

</div>

<script>

let meta = Number(localStorage.getItem("rrinvest_meta_xadrez") || 0)
let qtd = Number(localStorage.getItem("rrinvest_qtd_xadrez") || 100)

let valores=[]
let marcados=new Set()

function formatar(v){
return Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

function chaveBase(){
return "rrinvest_rendimento_base_"+usuario.id
}

function chaveInicio(){
return "rrinvest_rendimento_inicio_"+usuario.id
}

function chaveDesconto(){
return "rrinvest_xadrez_desconto_"+usuario.id
}

function lerEstado(){
return{
base:Number(localStorage.getItem(chaveBase())||0),
inicio:Number(localStorage.getItem(chaveInicio())||0)
}
}

function rendimentoPorSegundo(base){
return base*0.20/30/24/60/60
}

function calcularSaldo(){
const e=lerEstado()

if(!e.inicio) return e.base

const segundos=(Date.now()-e.inicio)/1000
return e.base+(segundos*rendimentoPorSegundo(e.base))
}

function atualizarSaldoTela(){

const desconto=Number(localStorage.getItem(chaveDesconto())||0)

const saldo=calcularSaldo()-desconto

document.getElementById("saldoAtual").innerText="R$ "+formatar(saldo)

}

function gerarValores(){

valores=[]

for(let i=0;i<qtd;i++){
valores.push(Math.floor(Math.random()*190)+10)
}

render()

}

function render(){

const grid=document.getElementById("grid")
grid.innerHTML=""

valores.forEach((v,i)=>{

const d=document.createElement("div")
d.className="quadrado"

if(marcados.has(i)){
d.classList.add("marcado")
}

d.innerHTML=`
<div class="numero">${i+1}</div>
<div class="valor">$${v}</div>
`

d.onclick=()=>toggle(i)

grid.appendChild(d)

})

calcularResumo()

}

function toggle(i){

if(marcados.has(i)){
marcados.delete(i)
}else{
marcados.add(i)
}

render()

}

function calcularResumo(){

let total=0

marcados.forEach(i=>{
total+=valores[i]
})

document.getElementById("marcado").innerText="R$ "+formatar(total)
document.getElementById("falta").innerText="R$ "+formatar(meta-total)
document.getElementById("qtd").innerText=marcados.size

}

function salvar(){

let total=0

marcados.forEach(i=>{
total+=valores[i]
})

localStorage.setItem("rrinvest_xadrez_desconto_"+usuario.id,total)

localStorage.setItem("rrinvest_xadrez_resumo_"+usuario.id,JSON.stringify({
meta:meta,
reservado:total,
marcados:marcados.size,
salvo:true
}))

alert("Estratégia salva")

}

function gerarNovo(){

marcados.clear()
gerarValores()

}

function voltar(){
history.back()
}

let usuario=null

async function iniciar(){

const {data}=await sb.auth.getSession()

usuario=data.session.user

document.getElementById("metaValor").innerText="R$ "+formatar(meta)

atualizarSaldoTela()

setInterval(atualizarSaldoTela,100)

gerarValores()

}

iniciar()

</script>

</body>
</html>
