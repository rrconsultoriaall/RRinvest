<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RRinvest</title>

<link rel="stylesheet" href="style.css?v=20">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>

<div class="app">

<div class="topbar">

<div>

<div class="brand">RRinvest</div>
<div class="brand-sub">Painel financeiro</div>

</div>

<div class="premium-badge">Premium</div>

</div>

<div class="card saldo-card">

<div class="saldo-topo">

<div class="cliente-nome" id="nomeCliente">...</div>
<div class="cliente-label">Saldo disponível</div>

</div>

<div class="saldo-valor" id="saldo">R$ 0,00</div>

<div class="reserva-info" id="reservaXadrez">

Reservado na Estratégia Xadrez: <strong>R$ 0,00</strong>

</div>

</div>


<div class="card">

<div class="acoes-grid">

<button class="btn btn-deposito" onclick="location.href='depositar.html'">

<span class="material-symbols-rounded icon">add</span>
Depositar

</button>


<button class="btn btn-saque" onclick="location.href='sacar.html'">

<span class="material-symbols-rounded icon">arrow_downward</span>
Sacar

</button>


<button class="btn btn-notificacoes" onclick="location.href='notificacoes.html'">

<span class="material-symbols-rounded icon">notifications</span>
Notificações

</button>

</div>

<button class="btn btn-sair" onclick="sair()">

<span class="material-symbols-rounded icon">logout</span>
Sair

</button>

</div>



<div class="card">

<div class="card-title">Estratégia Xadrez</div>

<div class="card-subtitle">

Monte sua estratégia de depósitos do jeito que preferir.

</div>


<div id="estrategiaSalva" class="xadrez-salva-box oculto">

<div class="xadrez-salva-topo">

<div class="xadrez-salva-titulo">Estratégia salva</div>

<div class="xadrez-salva-status">Ativa</div>

</div>


<div class="xadrez-salva-grid">

<div class="xadrez-info-item">

<div class="xadrez-info-label">Meta</div>
<strong id="metaSalva">R$ 0,00</strong>

</div>


<div class="xadrez-info-item">

<div class="xadrez-info-label">Reservado</div>
<strong id="reservadoSalvo">R$ 0,00</strong>

</div>


<div class="xadrez-info-item">

<div class="xadrez-info-label">Marcados</div>
<strong id="marcadosSalvo">0</strong>

</div>

</div>


<button class="btn btn-abrir-salva" onclick="abrirEstrategia()">

<span class="material-symbols-rounded icon">open_in_new</span>
Abrir estratégia salva

</button>

</div>


<div class="form-group">

<input id="valorMeta" placeholder="Digite o valor que quer juntar">

</div>


<div class="form-group">

<select id="qtdQuadrados">

<option value="100">100 quadrados</option>
<option value="200">200 quadrados</option>
<option value="300">300 quadrados</option>
<option value="500">500 quadrados</option>

</select>

</div>


<button class="btn btn-xadrez" onclick="criarEstrategia()">

<span class="material-symbols-rounded icon">grid_view</span>
Criar estratégia

</button>

</div>



<div class="card">

<div class="extrato-header">

<div class="card-title">Extrato</div>

<div class="card-subtitle">

Últimas movimentações pendentes

</div>

</div>

<div id="extratoLista" class="extrato-lista"></div>

</div>


</div>



<script>

let usuario = null

let saldoBase = 0
let rendimentoPorSegundo = 0
let inicioRendimento = 0



function formatarReal(v){

return Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2})

}



function iniciarRendimento(saldoInicial){

saldoBase = Number(saldoInicial)

rendimentoPorSegundo = saldoBase * 0.20 / 30 / 24 / 60 / 60

inicioRendimento = Date.now()

atualizarSaldo()

setInterval(atualizarSaldo,1000)

}



function atualizarSaldo(){

const agora = Date.now()

const segundos = (agora - inicioRendimento) / 1000

const crescimento = segundos * rendimentoPorSegundo

const saldoAtual = saldoBase + crescimento

document.getElementById("saldo").innerText =
"R$ " + formatarReal(saldoAtual)

}



async function verificarLogin(){

const {data,error} = await sb.auth.getSession()

if(error || !data.session){

location.href = "login.html"

return

}

usuario = data.session.user

}



async function carregarPerfil(){

const {data,error} = await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.single()

if(data){

document.getElementById("nomeCliente").innerText =
data.nome || "Cliente"

iniciarRendimento(data.saldo || 0)

}

}



function criarEstrategia(){

const valor = document.getElementById("valorMeta").value
const qtd = document.getElementById("qtdQuadrados").value

if(!valor){

alert("Digite o valor da meta")

return

}

localStorage.setItem("rrinvest_meta_xadrez",valor)
localStorage.setItem("rrinvest_qtd_xadrez",qtd)

location.href="estrategia_xadrez.html"

}



function abrirEstrategia(){

location.href="estrategia_xadrez.html"

}



function sair(){

sb.auth.signOut()
location.href="login.html"

}



async function iniciar(){

await verificarLogin()

await carregarPerfil()

}

iniciar()

</script>


</body>
</html>
