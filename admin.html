<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.depositos{
background:#1e4ea1;
color:white;
position:relative;
}

.saques{
background:#1faa59;
color:white;
position:relative;
}

.clientes{
background:#444;
color:white;
}

.sair{
background:#c0392b;
color:white;
}

.badge{
position:absolute;
top:-8px;
right:-8px;
background:red;
color:white;
font-size:12px;
padding:4px 7px;
border-radius:20px;
min-width:20px;
text-align:center;
}

</style>
</head>

<body>

<div class="card">

<h2>Painel Admin</h2>

<button class="depositos" onclick="location.href='admin_depositos.html'">
Depósitos
<span id="badgeDeposito" class="badge" style="display:none">0</span>
</button>

<button class="saques" onclick="location.href='admin_saques.html'">
Saques
<span id="badgeSaque" class="badge" style="display:none">0</span>
</button>

<button class="clientes" onclick="location.href='admin_clientes.html'">
Clientes
</button>

<button class="sair" onclick="logout()">
Sair
</button>

</div>

<script>

async function verificarPendentes(){

const {count:depositos}=await sb
.from("transacoes")
.select("*",{count:"exact",head:true})
.eq("tipo","deposito")
.eq("status","pendente")

const {count:saques}=await sb
.from("transacoes")
.select("*",{count:"exact",head:true})
.eq("tipo","saque")
.eq("status","pendente")

if(depositos>0){
const badge=document.getElementById("badgeDeposito")
badge.style.display="block"
badge.innerText=depositos
}

if(saques>0){
const badge=document.getElementById("badgeSaque")
badge.style.display="block"
badge.innerText=saques
}

}

async function logout(){
await sb.auth.signOut()
location.href="login.html"
}

verificarPendentes()

</script>

</body>
</html>
