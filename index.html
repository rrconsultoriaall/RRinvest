<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:24px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 4px 18px rgba(0,0,0,0.08);
text-align:center;
}

.nome{
font-size:22px;
font-weight:bold;
}

.saldo{
font-size:46px;
font-weight:bold;
color:#0b3d91;
margin-top:8px;
}

.caverna{
background:#1c1c1c;
border-radius:14px;
padding:10px;
height:180px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
}

svg{
width:260px;
}

.picareta{
transform-origin:140px 70px;
animation:bate 0.7s infinite alternate;
}

@keyframes bate{
from{transform:rotate(-20deg)}
to{transform:rotate(15deg)}
}

.pedra{
animation:pedra 0.7s infinite alternate;
}

@keyframes pedra{
from{transform:translateX(0px)}
to{transform:translateX(3px)}
}

.particula{
opacity:0;
animation:particula 1s infinite;
}

@keyframes particula{
0%{opacity:0; transform:translateY(0px)}
50%{opacity:1}
100%{opacity:0; transform:translateY(-20px)}
}

.moeda{
opacity:0;
animation:moeda 2s infinite;
}

@keyframes moeda{
0%{opacity:0; transform:translateY(0)}
50%{opacity:1}
100%{opacity:0; transform:translateY(-40px)}
}

.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.depositar{
background:#1e4ea1;
color:white;
}

.sacar{
background:#1faa59;
color:white;
}

.notif{
background:#444;
color:white;
position:relative;
}

.sair{
background:#1e4ea1;
color:white;
width:100%;
margin-top:10px;
}

.badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
width:18px;
height:18px;
border-radius:50%;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
}

.pendente{
color:orange;
font-weight:bold;
}

</style>

</head>
<body>

<!-- CARD 1 -->
<div class="card">

<div class="nome" id="nome">Carregando...</div>

<div class="saldo" id="saldo">R$ 0,00</div>

</div>

<!-- CARD 2 -->
<div class="card">

<div style="margin-bottom:10px;font-weight:bold">
⛏️ Minerando lucros...
</div>

<div class="caverna">

<svg viewBox="0 0 260 160">

<!-- chão -->
<rect x="0" y="120" width="260" height="40" fill="#2a2a2a"/>

<!-- pedra -->
<polygon class="pedra" points="170,110 190,80 220,90 210,120"
fill="#777"/>

<!-- mineiro corpo -->
<circle cx="110" cy="80" r="12" fill="#ffcc99"/>

<!-- capacete -->
<rect x="98" y="66" width="24" height="8" fill="#f4c542"/>

<!-- corpo -->
<rect x="104" y="90" width="12" height="20" fill="#3366cc"/>

<!-- braço -->
<line x1="110" y1="95" x2="140" y2="70" stroke="#ffcc99" stroke-width="5"/>

<!-- picareta -->
<g class="picareta">
<line x1="140" y1="70" x2="165" y2="55"
stroke="#8b5a2b" stroke-width="4"/>
<line x1="160" y1="50" x2="175" y2="60"
stroke="#bbb" stroke-width="4"/>
</g>

<!-- partículas -->
<circle class="particula" cx="200" cy="80" r="2" fill="#ffdd55"/>
<circle class="particula" cx="210" cy="90" r="2" fill="#ffdd55"/>
<circle class="particula" cx="195" cy="95" r="2" fill="#ffdd55"/>

<!-- moedas -->
<circle class="moeda" cx="210" cy="70" r="5" fill="#ffd700"/>
<circle class="moeda" cx="220" cy="75" r="5" fill="#ffd700"/>

</svg>

</div>

</div>

<!-- CARD 3 -->
<div class="card">

<div class="botoes">

<button class="depositar" onclick="irDeposito()">
Depositar
</button>

<button class="sacar" onclick="irSaque()">
Sacar
</button>

<button class="notif" onclick="toggleNotificacoes()">
Notificações
<span id="badge" class="badge oculto">!</span>
</button>

</div>

<button class="sair" onclick="logout()">
Sair
</button>

</div>

<!-- CARD 4 -->
<div class="card">

<h3>Extrato</h3>

<div id="extrato">
Carregando...
</div>

</div>

<script>

let usuario=null

function formatarReal(v){
return Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2})
}

function horarioBrasil(data){
return new Date(data).toLocaleString("pt-BR",{timeZone:"America/Sao_Paulo"})
}

async function verificarLogin(){

const {data,error}=await sb.auth.getSession()

if(error || !data.session){

location.href="login.html"
return false

}

usuario=data.session.user
return true

}

async function carregarPerfil(){

const {data}=await sb
.from("profiles")
.select("*")
.eq("id",usuario.id)
.single()

document.getElementById("nome").innerText=data.nome
document.getElementById("saldo").innerText="R$ "+formatarReal(data.saldo)

}

async function carregarExtrato(){

const {data}=await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.eq("status","pendente")
.order("created_at",{ascending:false})

if(!data || data.length==0){

document.getElementById("extrato").innerHTML="Nenhuma solicitação pendente."
return

}

let html=""

data.forEach(t=>{

html+=`

<p>

<b>${t.tipo}</b><br>

Valor: R$ ${formatarReal(t.valor)}<br>

Status: <span class="pendente">${t.status}</span><br>

${horarioBrasil(t.created_at)}

</p>

<hr>

`

})

document.getElementById("extrato").innerHTML=html

}

function irDeposito(){
location.href="deposito.html"
}

function irSaque(){
location.href="saque.html"
}

async function logout(){

await sb.auth.signOut()
location.href="login.html"

}

async function iniciar(){

const ok=await verificarLogin()

if(!ok) return

await carregarPerfil()

await carregarExtrato()

}

iniciar()

</script>

</body>
</html>
