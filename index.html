<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RRinvest</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body>

<div class="container">

<div class="topoApp">

<div>
<div class="logoNome">RRinvest</div>
<div class="logoSub">Painel financeiro</div>
</div>

<div class="statusChip">
Premium
</div>

</div>


<!-- CARD SALDO -->

<div class="card cardSaldo">

<div id="nome" class="nome">
Carregando...
</div>

<div class="saldo" id="saldo">
R$ 0,00
</div>

</div>



<!-- CARD ESTRATÉGIA XADREZ -->

<div class="card">

<div class="cardTitulo">
Estratégia Xadrez
</div>

<div class="cardSubtitulo">
Escolha um valor para montar sua estratégia de depósitos.
</div>

<input id="valorMeta" placeholder="Ex: 10000">

<select id="quantidade">
<option value="100">100 quadrados</option>
<option value="200">200 quadrados</option>
<option value="300">300 quadrados</option>
<option value="500">500 quadrados</option>
</select>

<button class="btnPrincipal xadrez" onclick="criarXadrez()">
Criar estratégia
</button>

</div>



<!-- BOTÕES -->

<div class="card">

<div class="botoes">

<button class="depositar" onclick="location.href='deposito.html'">
Depositar
</button>

<button class="sacar" onclick="location.href='saque.html'">
Sacar
</button>

<button class="notif" onclick="location.href='notificacoes.html'">

Notificações

<div id="badge" class="badge">
0
</div>

</button>

</div>

<button class="sair" onclick="sair()">
Sair
</button>

</div>



<!-- EXTRATO -->

<div class="card">

<div class="extratoTopo">

<div class="extratoTitulo">
Extrato
</div>

<div class="extratoSub">
Últimas movimentações
</div>

</div>

<div id="extrato" class="extratoLista">

<div class="vazio">
Nenhuma solicitação pendente.
</div>

</div>

</div>

</div>



<script>

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let usuario = JSON.parse(localStorage.getItem("usuario"))

if(!usuario){

location.href="login.html"

}



async function carregar(){

const {data} = await supabase
.from("clientes")
.select("*")
.eq("id",usuario.id)
.single()

document.getElementById("nome").innerText=data.nome

let saldo = data.saldo || 0

saldo -= parseFloat(localStorage.getItem("descontoXadrez") || 0)

document.getElementById("saldo").innerText = 
"R$ " + saldo.toFixed(2).replace(".",",")

}


async function carregarExtrato(){

const {data} = await supabase
.from("movimentacoes")
.select("*")
.eq("cliente_id",usuario.id)
.order("id",{ascending:false})
.limit(10)

let html=""

if(data.length==0){

html='<div class="vazio">Nenhuma solicitação pendente.</div>'

}else{

data.forEach(m=>{

html+=`

<div class="extratoItem">

<div class="tipoLinha">

<div class="tipoTag">
${m.tipo}
</div>

<div class="valorLinha">
R$ ${m.valor}
</div>

</div>

<div class="statusPendente">
${m.status}
</div>

</div>

`

})

}

document.getElementById("extrato").innerHTML=html

}



async function notificacoes(){

const {count} = await supabase
.from("movimentacoes")
.select("*",{count:"exact",head:true})
.eq("cliente_id",usuario.id)
.eq("status","pendente")

if(count>0){

let badge=document.getElementById("badge")

badge.style.display="block"

badge.innerText=count

}

}



function criarXadrez(){

let meta = document.getElementById("valorMeta").value
let qtd = document.getElementById("quantidade").value

if(!meta){

alert("Digite um valor")

return

}

localStorage.setItem("metaXadrez",meta)
localStorage.setItem("qtdXadrez",qtd)

location.href="xadrez.html"

}



function sair(){

localStorage.removeItem("usuario")

location.href="login.html"

}



carregar()
carregarExtrato()
notificacoes()

</script>

</body>
</html>
