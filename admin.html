<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin - RRinvest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f3f3f3;
padding:20px;
margin:0;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h1,h2{
margin-top:0;
}

button{
padding:12px 16px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-top:10px;
margin-right:10px;
}

.btn-aprovar{
background:#28a745;
color:white;
}

.btn-sair{
background:#d9534f;
color:white;
}

.item{
border-bottom:1px solid #eee;
padding:12px 0;
line-height:1.6;
}

.item:last-child{
border-bottom:none;
}

.msg{
font-weight:bold;
margin-top:10px;
}

.erro{
color:#c0392b;
}

.ok{
color:#1f8f4e;
}
</style>
</head>
<body>

<div class="card">
<h1>Painel Admin</h1>
<button class="btn-sair" onclick="logout()">Sair</button>
<div id="msgGeral" class="msg"></div>
</div>

<div class="card">
<h2>Depósitos pendentes</h2>
<div id="depositos">Carregando...</div>
</div>

<div class="card">
<h2>Saques pendentes</h2>
<div id="saques">Carregando...</div>
</div>

<div class="card">
<h2>Clientes</h2>
<div id="clientes">Carregando...</div>
</div>

<div class="card">
<h2>Movimentações aprovadas</h2>
<div id="movimentos">Carregando...</div>
</div>

<script>
let usuarioAtual = null

function horarioBrasil(data){
return new Date(data).toLocaleString("pt-BR",{
timeZone:"America/Sao_Paulo"
})
}

function formatarReal(valor){
return Number(valor || 0).toLocaleString("pt-BR",{
minimumFractionDigits:2,
maximumFractionDigits:2
})
}

function setMsg(texto, tipo=""){
const el = document.getElementById("msgGeral")
el.className = "msg " + tipo
el.innerText = texto
}

async function verificarLogin(){
const { data, error } = await sb.auth.getSession()

if(error){
setMsg(error.message,"erro")
return false
}

if(!data.session){
location.href = "login.html"
return false
}

usuarioAtual = data.session.user
return true
}

async function carregarClientes(){
const div = document.getElementById("clientes")
div.innerHTML = "Carregando..."

const { data, error } = await sb
.from("profiles")
.select("*")
.order("created_at",{ascending:false})

if(error){
div.innerHTML = `<div class="erro">${error.message}</div>`
return
}

if(!data || data.length===0){
div.innerHTML = "Nenhum cliente encontrado."
return
}

let html = ""

data.forEach(c=>{
html += `
<div class="item">
<b>${c.nome || "-"}</b><br>
Email: ${c.email || "-"}<br>
Telefone: ${c.telefone || "-"}<br>
Saldo: R$ ${formatarReal(c.saldo)}
</div>
`
})

div.innerHTML = html
}

async function carregarDepositos(){
const div = document.getElementById("depositos")
div.innerHTML = "Carregando..."

const { data, error } = await sb
.from("transacoes")
.select("*")
.eq("tipo","deposito")
.eq("status","pendente")
.order("created_at",{ascending:false})

if(error){
div.innerHTML = `<div class="erro">${error.message}</div>`
return
}

if(!data || data.length===0){
div.innerHTML = "Nenhum depósito pendente."
return
}

let html = ""

data.forEach(d=>{
html += `
<div class="item">
<b>Depósito</b><br>
Usuário: ${d.usuario_email || "-"}<br>
Valor: R$ ${formatarReal(d.valor)}<br>
Status: ${d.status || "-"}<br>
Data: ${horarioBrasil(d.created_at)}<br>
<button class="btn-aprovar" onclick="aprovarDeposito(${d.id},'${d.usuario_id}',${Number(d.valor)})">Aprovar depósito</button>
</div>
`
})

div.innerHTML = html
}

async function carregarSaques(){
const div = document.getElementById("saques")
div.innerHTML = "Carregando..."

const { data, error } = await sb
.from("transacoes")
.select("*")
.eq("tipo","saque")
.eq("status","pendente")
.order("created_at",{ascending:false})

if(error){
div.innerHTML = `<div class="erro">${error.message}</div>`
return
}

if(!data || data.length===0){
div.innerHTML = "Nenhum saque pendente."
return
}

let html = ""

data.forEach(s=>{
html += `
<div class="item">
<b>Saque</b><br>
Usuário: ${s.usuario_email || "-"}<br>
Valor: R$ ${formatarReal(s.valor)}<br>
Detalhe: ${s.descricao || "-"}<br>
Status: ${s.status || "-"}<br>
Data: ${horarioBrasil(s.created_at)}<br>
</div>
`
})

div.innerHTML = html
}

async function carregarMovimentos(){
const div = document.getElementById("movimentos")
div.innerHTML = "Carregando..."

const { data, error } = await sb
.from("transacoes")
.select("*")
.eq("status","aprovado")
.order("created_at",{ascending:false})

if(error){
div.innerHTML = `<div class="erro">${error.message}</div>`
return
}

if(!data || data.length===0){
div.innerHTML = "Nenhuma movimentação aprovada."
return
}

let html = ""

data.forEach(m=>{
html += `
<div class="item">
<b>${m.tipo || "-"}</b><br>
Usuário: ${m.usuario_email || "-"}<br>
Valor: R$ ${formatarReal(m.valor)}<br>
Descrição: ${m.descricao || "-"}<br>
Status: ${m.status || "-"}<br>
Data: ${horarioBrasil(m.created_at)}
</div>
`
})

div.innerHTML = html
}

async function aprovarDeposito(id, usuarioId, valor){
setMsg("Aprovando depósito...")

const { data: perfil, error: erroPerfil } = await sb
.from("profiles")
.select("saldo")
.eq("id", usuarioId)
.single()

if(erroPerfil){
setMsg(erroPerfil.message,"erro")
return
}

const novoSaldo = Number(perfil.saldo || 0) + Number(valor || 0)

const { error: erroSaldo } = await sb
.from("profiles")
.update({ saldo: novoSaldo })
.eq("id", usuarioId)

if(erroSaldo){
setMsg(erroSaldo.message,"erro")
return
}

const { error: erroTransacao } = await sb
.from("transacoes")
.update({ status: "aprovado" })
.eq("id", id)

if(erroTransacao){
setMsg(erroTransacao.message,"erro")
return
}

setMsg("Depósito aprovado com sucesso.","ok")

await carregarDepositos()
await carregarClientes()
await carregarMovimentos()
}

async function logout(){
await sb.auth.signOut()
location.href = "login.html"
}

async function iniciar(){
const ok = await verificarLogin()
if(!ok) return

await carregarDepositos()
await carregarSaques()
await carregarClientes()
await carregarMovimentos()
}

iniciar()
</script>
</body>
</html>
