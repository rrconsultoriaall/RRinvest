<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRinvest</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<link rel="stylesheet" href="style.css?v=100">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>
<body>

<div class="app">

<div class="topbar">
<div>
<div class="brand">RRinvest</div>
<div class="brand-sub">Acesso ao sistema</div>
</div>
<div class="premium-badge">Login</div>
</div>

<div class="card">

<div class="card-title">Entrar</div>
<div class="card-subtitle">Use seu e-mail e senha</div>

<div class="form-group">
<input type="email" id="email" placeholder="Seu e-mail">
</div>

<div class="form-group">
<input type="password" id="senha" placeholder="Sua senha">
</div>

<button class="btn btn-deposito" style="width:100%" onclick="login()">
<span class="material-symbols-rounded icon">login</span>
Entrar
</button>

<div style="height:20px"></div>

<div class="card-title">Criar conta</div>
<div class="card-subtitle">Cadastre-se para começar</div>

<div class="form-group">
<input type="text" id="nome" placeholder="Seu nome">
</div>

<div class="form-group">
<input type="text" id="telefone" placeholder="Telefone">
</div>

<div class="form-group">
<input type="email" id="emailCadastro" placeholder="Seu e-mail">
</div>

<div class="form-group">
<input type="password" id="senhaCadastro" placeholder="Crie uma senha">
</div>

<button class="btn btn-xadrez" style="width:100%" onclick="criarConta()">
<span class="material-symbols-rounded icon">person_add</span>
Criar conta
</button>

<div id="msg" class="vazio" style="margin-top:10px;"></div>

</div>

</div>

<script>

async function login(){

const email = document.getElementById("email").value.trim()
const senha = document.getElementById("senha").value.trim()
const msg = document.getElementById("msg")

msg.innerText=""

if(!email || !senha){
msg.innerText="Preencha e-mail e senha"
return
}

const { data, error } = await sb.auth.signInWithPassword({
email: email,
password: senha
})

if(error){
msg.innerText="Login inválido"
return
}

const userId = data.user.id

const { data:perfil } = await sb
.from("profiles")
.select("admin")
.eq("id",userId)
.single()

if(perfil?.admin === true){

location.href="admin.html"

}else{

location.href="index.html"

}

}

async function criarConta(){

const nome=document.getElementById("nome").value.trim()
const telefone=document.getElementById("telefone").value.trim()
const email=document.getElementById("emailCadastro").value.trim()
const senha=document.getElementById("senhaCadastro").value.trim()

const msg=document.getElementById("msg")
msg.innerText=""

if(!nome || !telefone || !email || !senha){
msg.innerText="Preencha todos os campos"
return
}

const { data, error } = await sb.auth.signUp({
email: email,
password: senha
})

if(error){
msg.innerText=error.message
return
}

const userId=data.user.id

await sb.from("profiles").insert([
{
id:userId,
nome:nome,
telefone:telefone,
saldo:0,
admin:false
}
])

msg.innerText="Conta criada! Agora faça login."

}

async function verificarSessao(){

const { data } = await sb.auth.getSession()

if(!data.session) return

const userId=data.session.user.id

const { data:perfil } = await sb
.from("profiles")
.select("admin")
.eq("id",userId)
.single()

if(perfil?.admin){

location.href="admin.html"

}else{

location.href="index.html"

}

}

verificarSessao()

</script>

</body>
</html>
