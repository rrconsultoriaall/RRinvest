<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRinvest</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
<script src="config.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

.card{
background:white;
padding:22px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
text-align:center;
}

.nome{
font-size:22px;
font-weight:bold;
color:#111;
}

.saldo{
font-size:54px;
font-weight:bold;
color:#0b3d91;
margin-top:12px;
letter-spacing:-1px;
}

.mineracaoCard{
background:linear-gradient(180deg,#101010 0%,#1b1b1b 100%);
color:white;
overflow:hidden;
position:relative;
}

.mineracaoTitulo{
font-size:18px;
font-weight:bold;
margin-bottom:14px;
}

.animacaoBox{
max-width:420px;
margin:0 auto;
background:rgba(255,255,255,0.03);
border-radius:16px;
padding:8px;
}

.barraBox{
margin-top:14px;
height:10px;
background:rgba(255,255,255,0.12);
border-radius:999px;
overflow:hidden;
}

.barra{
height:100%;
width:35%;
background:linear-gradient(90deg,#f7c948,#ffd700);
border-radius:999px;
animation:barraLoop 2.8s infinite ease-in-out;
}

@keyframes barraLoop{
0%{width:15%}
50%{width:82%}
100%{width:15%}
}

.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
font-weight:500;
}

.depositar{
background:#1e4ea1;
color:white;
}

.sacar{
background:#1faa59;
color:white;
}

.notif{
background:#444;
color:white;
position:relative;
}

.sair{
background:#1e4ea1;
color:white;
width:100%;
margin-top:10px;
}

.badge{
position:absolute;
top:-8px;
right:-8px;
background:#ff2d2d;
color:white;
min-width:20px;
height:20px;
border-radius:999px;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
padding:0 6px;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.oculto{
display:none;
}

.pendente{
color:orange;
font-weight:bold;
}

.extratoItem{
padding:12px 0;
border-bottom:1px solid #eee;
line-height:1.6;
}

.extratoItem:last-child{
border-bottom:none;
}
</style>
</head>
<body>

<!-- CARD 1 -->
<div class="card">
<div id="nome" class="nome">Carregando...</div>
<div id="saldo" class="saldo">R$ 0,00</div>
</div>

<!-- CARD 2 -->
<div class="card mineracaoCard">
<div class="mineracaoTitulo">⛏️ Minerando lucros...</div>

<div class="animacaoBox">
<lottie-player
src="https://assets9.lottiefiles.com/packages/lf20_9cyyl8i6.json"
background="transparent"
speed="1"
style="width:100%;height:220px"
loop
autoplay>
</lottie-player>
</div>

<div class="barraBox">
<div class="barra"></div>
</div>
</div>

<!-- CARD 3 -->
<div class="card">
<div class="botoes">
<button class="depositar" onclick="irDeposito()">Depositar</button>
<button class="sacar" onclick="irSaque()">Sacar</button>
<button class="notif" onclick="abrirNotificacoes()">
Notificações
<span id="badge" class="badge oculto">0</span>
</button>
</div>

<button class="sair" onclick="logout()">Sair</button>
</div>

<!-- CARD 4 -->
<div class="card">
<h3>Extrato</h3>
<div id="extrato">Carregando...</div>
</div>

<script>
let usuario = null
let saldoAtual = 0
let rendimentoPorMinuto = 0
let timerSaldo = null

function formatarReal(v){
return Number(v || 0).toLocaleString("pt-BR",{
minimumFractionDigits:2,
maximumFractionDigits:2
})
}

function calcularRendimentoPorMinuto(saldo){
return ((Number(saldo || 0) * 0.20) / 30 / 24 / 60)
}

function horarioBrasil(data){
return new Date(data).toLocaleString("pt-BR",{
timeZone:"America/Sao_Paulo"
})
}

function atualizarSaldoNaTela(){
document.getElementById("saldo").innerText = "R$ " + formatarReal(saldoAtual)
}

function iniciarLoopSaldo(){
if(timerSaldo){
clearInterval(timerSaldo)
}

timerSaldo = setInterval(()=>{
saldoAtual = Number(saldoAtual) + Number(rendimentoPorMinuto)
atualizarSaldoNaTela()
},60000)
}

async function verificarLogin(){
const { data, error } = await sb.auth.getSession()

if(error || !data.session){
location.href = "login.html"
return false
}

usuario = data.session.user
return true
}

async function carregarPerfil(){
const { data, error } = await sb
.from("profiles")
.select("*")
.eq("id", usuario.id)
.single()

if(error || !data) return

document.getElementById("nome").innerText = data.nome
saldoAtual = Number(data.saldo || 0)
rendimentoPorMinuto = calcularRendimentoPorMinuto(saldoAtual)

atualizarSaldoNaTela()
iniciarLoopSaldo()
}

async function carregarExtrato(){
const { data, error } = await sb
.from("transacoes")
.select("*")
.eq("usuario_id", usuario.id)
.eq("status", "pendente")
.order("created_at", { ascending:false })

if(error){
document.getElementById("extrato").innerHTML = "Erro ao carregar extrato."
return
}

if(!data || data.length === 0){
document.getElementById("extrato").innerHTML = "Nenhuma solicitação pendente."
return
}

let html = ""

data.forEach(t => {
html += `
<div class="extratoItem">
<b>${t.tipo}</b><br>
Valor: R$ ${formatarReal(t.valor)}<br>
Status: <span class="pendente">${t.status}</span><br>
${horarioBrasil(t.created_at)}
</div>
`
})

document.getElementById("extrato").innerHTML = html
}

async function verificarNotificacoes(){
const { count, error } = await sb
.from("notificacoes")
.select("*", { count:"exact", head:true })
.eq("usuario_id", usuario.id)
.eq("lida", false)

if(error) return

const badge = document.getElementById("badge")

if(count && count > 0){
badge.innerText = count > 99 ? "99+" : count
badge.classList.remove("oculto")
}else{
badge.classList.add("oculto")
}
}

function abrirNotificacoes(){
location.href = "notificacoes.html"
}

function irDeposito(){
location.href = "deposito.html"
}

function irSaque(){
location.href = "saque.html"
}

async function logout(){
await sb.auth.signOut()
location.href = "login.html"
}

async function iniciar(){
const ok = await verificarLogin()
if(!ok) return

await carregarPerfil()
await carregarExtrato()
await verificarNotificacoes()
}

iniciar()
</script>

</body>
</html>
