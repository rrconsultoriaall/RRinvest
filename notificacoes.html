<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notificações</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
margin-bottom:15px;
}

.voltar{
background:#1e4ea1;
color:white;
padding:12px;
border:none;
border-radius:8px;
width:100%;
font-size:16px;
margin-top:20px;
}

</style>

</head>

<body>

<h2>Notificações</h2>

<div id="lista"></div>

<button class="voltar" onclick="voltar()">
Voltar
</button>

<script>

let usuario=null

async function iniciar(){

const {data}=await sb.auth.getSession()

usuario=data.session.user

const {data:notificacoes}=await sb
.from("transacoes")
.select("*")
.eq("usuario_id",usuario.id)
.eq("status","aprovado")

let html=""

if(!notificacoes || notificacoes.length==0){

html="Nenhuma notificação."

}else{

notificacoes.forEach(n=>{

html+=`

<div class="card">

<b>${n.tipo} aprovado</b><br>
Valor: R$ ${n.valor}

</div>

`

})

}

document.getElementById("lista").innerHTML=html

}

function voltar(){
location.href="index.html"
}

iniciar()

</script>

</body>
</html>
